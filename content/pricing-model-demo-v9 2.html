      const connector = document.getElementById('knob-price-connector');
      if (connector) {
        Tween.run(connector, { opacity: 0 }, 300);
        scheduleBeat(() => { if (connector.parentNode) connector.parentNode.removeChild(connector); }, 350);
      }

      // Hide beat-8 dot stat (slot R) — chip floating over a single dot doesn't make
      // sense once we have many dots.
      const _dotStat = document.getElementById('small-curve-dot-stat');
      if (_dotStat) Tween.run(_dotStat, { opacity: 0 }, 300);

      // === Staggered knob reveal: row-major, 80ms per slot ===
      // The 4 diagonal knobs are already visible from beat 8 (just repositioned).
      // The 12 off-diagonal knobs (created invisible) fade in at row-major positions.
      const STEP = 70;
      KNOBS.forEach((k, i) => {
        if (parseFloat(k.g.getAttribute('opacity')) < 0.95) {
          scheduleBeat(() => {
            if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].storyId === '9') {
              Tween.run(k.g, { opacity: 1 }, 500);
            }
          }, i * STEP);
        }
      });
      const totalRevealMs = 16 * STEP;

      // === Stagger-rotate several knobs to suggest interactions ===
      const rotateBatch = [1, 3, 6, 9, 12, 14, 2, 7, 11];
      rotateBatch.forEach((idx, n) => {
        scheduleBeat(() => {
          const deg = (Math.sin(idx * 1.7) * 50);
          rotateKnob(KNOBS[idx], deg, 800);
        }, totalRevealMs + 100 + n * 120);
      });

      // === Matrix labels reveal — after most knobs are in ===
      if (KNOBS16_MATRIX_LABELS) {
        scheduleBeat(() => {
          if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].storyId !== '9') return;
          KNOBS16_MATRIX_LABELS.topLabels.forEach((l, i) => {
            scheduleBeat(() => Tween.run(l, { opacity: 0.9 }, 300), i * 60);
          });
          KNOBS16_MATRIX_LABELS.leftLabels.forEach((l, i) => {
            scheduleBeat(() => Tween.run(l, { opacity: 0.9 }, 300), 200 + i * 60);
          });
        }, totalRevealMs - 100);
      }

      // === Highlight cell reveal — last, with a tiny bounce-pulse ===
      if (KNOBS16_HIGHLIGHT_G) {
        scheduleBeat(() => {
          if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].storyId !== '9') return;
          Tween.run(KNOBS16_HIGHLIGHT_G, { opacity: 1 }, 500);
        }, totalRevealMs + 800);
      }

      // Math caption below the grid — upgraded from italic muted to confident mono caps.
      let caption = document.getElementById('knobs-math-caption');
      if (KNOBS16_BOUNDS && !caption) {
        caption = svg('text', {
          x: KNOBS16_BOUNDS.centerX,
          y: KNOBS16_BOUNDS.bottomY + 32,
          'text-anchor': 'middle',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 13, 'letter-spacing': '0.16em',
          'font-weight': 700, fill: 'var(--brand-navy-ink)',
          id: 'knobs-math-caption',
          opacity: 0,
        });
        caption.textContent = '4 DRIVERS  ·  16 KNOBS TO TUNE';
        LAYERS.knobs.appendChild(caption);
      }
      if (caption) Tween.run(caption, { opacity: 1 }, 600);

      // Show extra curve dots (more knobs → more prices) staggered
      if (KNOBS_MANY_CURVE_DOTS) {
        KNOBS_MANY_CURVE_DOTS.forEach((d, i) => {
          scheduleBeat(() => {
            if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].storyId === '9') {
              Tween.run(d, { opacity: 0.9 }, 500);
            }
          }, totalRevealMs + 400 + i * 100);
        });
      }

      // Move the main curve dot to a new position to suggest price reacting
      if (SMALL_CURVE_DOT && SMALL_CURVE_R) {
        const target = SMALL_CURVE_R.sampleAt(0.42);
        Tween.run(SMALL_CURVE_DOT, { cx: target.x, cy: target.y }, 1200);
      }
    };

    // === CHAPTER 7 — ML auto-tunes ===
    // Knob grid shrinks to a small block on the right. Optimal curve grows to fill Slot C.
    // 20 dots scattered off the curve tween onto it while knobs spin.

    const AUTO_TUNE_CURVE_T = [
      0.06, 0.12, 0.18, 0.24, 0.30, 0.38, 0.46, 0.52, 0.58, 0.64,
      0.70, 0.76, 0.82, 0.88, 0.93, 0.97, 0.10, 0.42, 0.66, 0.85,
    ];

    // CONVERGED stat (top of chart) — revealed after the wave-converge completes.
    let AUTO_TUNE_STAT_G = null;
    function ensureAutoTuneStat() {
      if (AUTO_TUNE_STAT_G) return;
      AUTO_TUNE_STAT_G = svg('g', { id: 'auto-tune-stat', opacity: 0 });
      const sx = STAGE.C.x + 8;
      const eyebrow = svg('text', {
        x: sx, y: 56,
        'text-anchor': 'start',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 11, 'letter-spacing': '0.18em',
        'font-weight': 700, fill: 'var(--brand-orange)',
      });
      eyebrow.textContent = 'CONVERGED';
      AUTO_TUNE_STAT_G.appendChild(eyebrow);
      const stat = svg('text', {
        x: sx, y: 84,
        'text-anchor': 'start',
        'font-size': 20, 'font-weight': 700, fill: 'var(--brand-navy-ink)',
        'letter-spacing': '-0.01em',
      });
      stat.textContent = '20 DEALS  ·  100% ON CURVE';
      AUTO_TUNE_STAT_G.appendChild(stat);
      LAYERS.labels.appendChild(AUTO_TUNE_STAT_G);
    }

    CHAPTERS['auto-tune'] = function(beat, prevBeat) {
      ensureAutoTuneStat();
      // Hide stat first; it'll reveal after convergence completes.
      if (AUTO_TUNE_STAT_G) AUTO_TUNE_STAT_G.setAttribute('opacity', '0');

      // Remove beat-9 math caption on exit (mirrors the connector cleanup pattern from T12).
      const _caption = document.getElementById('knobs-math-caption');
      if (_caption) {
        Tween.run(_caption, { opacity: 0 }, 300);
        scheduleBeat(() => { if (_caption.parentNode) _caption.parentNode.removeChild(_caption); }, 350);
      }

      // Shrink the entire knob layer toward the right edge
      // We do this by giving LAYERS.knobs a transform tween
      const knobLayer = LAYERS.knobs;
      const t0 = performance.now();
      const dur = 700;
      const reduce = Tween.reduce;
      const targetTransform = 'translate(680, 100) scale(0.45)';
      if (reduce || APP.snapMode) {
        knobLayer.setAttribute('transform', targetTransform);
      } else {
        // Start from identity
        const m = (knobLayer.getAttribute('transform') || '').match(/translate\(([-\d.]+),\s*([-\d.]+)\)\s*scale\(([-\d.]+)\)/);
        const fromX = m ? parseFloat(m[1]) : 0;
        const fromY = m ? parseFloat(m[2]) : 0;
        const fromS = m ? parseFloat(m[3]) : 1;
        const toX = 680, toY = 100, toS = 0.45;
        (function tick(now) {
          const tt = Math.min(1, (now - t0) / dur);
          const e = Tween.ease(tt);
          const x = fromX + (toX - fromX) * e;
          const y = fromY + (toY - fromY) * e;
          const s = fromS + (toS - fromS) * e;
          knobLayer.setAttribute('transform', `translate(${x}, ${y}) scale(${s})`);
          if (tt < 1) requestAnimationFrame(tick);
        })(performance.now());
      }

      // Show the big curve in Slot C
      ensureCurveC();
      // V7: reset any morph transform left over from the 4→5 slide.
      if (CURVE_PATH_EL) CURVE_PATH_EL.removeAttribute('transform');
      if (BEAT2D_FILL_PATH) BEAT2D_FILL_PATH.removeAttribute('transform');
      Tween.run(CURVE_PATH_EL, { opacity: 1 }, 600);
      if (CURVE_LABEL_G) Tween.run(CURVE_LABEL_G, { opacity: 1 }, 600);
      const axes = document.getElementById('axes-c');
      if (axes) Tween.run(axes, { opacity: 1 }, 400);

      // Hide small curve (chapter 5/6 leftover)
      if (SMALL_CURVE_PATH) Tween.run(SMALL_CURVE_PATH, { opacity: 0 }, 300);
      if (SMALL_CURVE_DOT)  Tween.run(SMALL_CURVE_DOT, { opacity: 0 }, 300);
      const _axesRSmall = document.getElementById('axes-r-small');
      if (_axesRSmall) Tween.run(_axesRSmall, { opacity: 0 }, 300);
      const _curveLblRG = document.getElementById('curve-label-r-g');
      if (_curveLblRG) Tween.run(_curveLblRG, { opacity: 0 }, 300);
      const _dotStat = document.getElementById('small-curve-dot-stat');
      if (_dotStat) Tween.run(_dotStat, { opacity: 0 }, 300);

      // Place 20 dots scattered off the curve initially
      const rng = seededRng(8888);
      const offCurvePositions = [];
      const onCurvePositions = [];
      const curve = ensureCurveC();
      for (let i = 0; i < 20; i++) {
        const t = AUTO_TUNE_CURVE_T[i];
        const onP = curve.sampleAt(t);
        onCurvePositions.push(onP);
        offCurvePositions.push({
          x: onP.x + (rng() - 0.5) * STAGE.C.w * 0.18,
          y: onP.y + (rng() - 0.5) * STAGE.C.h * 0.30,
        });
      }
      // First, snap 20 dots to off-curve positions (bigger now for emphasis)
      for (let i = 0; i < 20; i++) {
        const dot = DOTS[i];
        dot.setAttribute('fill', 'var(--brand-orange)');
        dot.setAttribute('r', '7');
        Tween.run(dot, {
          cx: offCurvePositions[i].x,
          cy: offCurvePositions[i].y,
          opacity: 1,
        }, 500);
      }
      // Hide all other dots
      for (let i = 20; i < DOTS.length; i++) {
        if (parseFloat(DOTS[i].getAttribute('opacity')) > 0) {
          Tween.run(DOTS[i], { opacity: 0 }, 200);
        }
      }

      // Then: knob rotations + brief "thinking" jiggle + wave-converge onto curve
      scheduleBeat(() => {
        if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].chapter !== 'auto-tune') return;

        // Spin a bunch of knobs randomly (model "working")
        for (let i = 0; i < Math.min(16, KNOBS.length); i++) {
          const deg = (rng() - 0.5) * 180;
          scheduleBeat(() => rotateKnob(KNOBS[i], deg, 900), i * 60);
        }

        // Brief jiggle phase — dots wobble small amounts as if exploring positions.
        // 4 wobble steps × 130ms = 520ms of "thinking".
        const wobbleSteps = 4;
        const wobbleAmp = 5;
        for (let s = 0; s < wobbleSteps; s++) {
          scheduleBeat(() => {
            if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].chapter !== 'auto-tune') return;
            for (let i = 0; i < 20; i++) {
              const dot = DOTS[i];
              const baseX = offCurvePositions[i].x;
              const baseY = offCurvePositions[i].y;
              const dx = (rng() - 0.5) * wobbleAmp * 2;
              const dy = (rng() - 0.5) * wobbleAmp * 2;
              Tween.run(dot, { cx: baseX + dx, cy: baseY + dy }, 120);
            }
          }, s * 130);
        }

        // Wave-converge: sort dots by target x (left-to-right) and stagger.
        const sortedIdx = Array.from({ length: 20 }, (_, i) => i)
          .sort((a, b) => onCurvePositions[a].x - onCurvePositions[b].x);
        const WAVE_START = wobbleSteps * 130 + 80;  // after jiggle finishes
        sortedIdx.forEach((i, n) => {
          scheduleBeat(() => {
            if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].chapter !== 'auto-tune') return;
            Tween.run(DOTS[i], {
              cx: onCurvePositions[i].x,
              cy: onCurvePositions[i].y,
            }, 650);
          }, WAVE_START + n * 55);
        });

        // v9 feedback: keep the knobs turning + rotating *while* the dots
        // converge onto the curve. Multiple rotation waves through the
        // convergence window so the panel reads as actively tuning, not
        // already-settled.
        const convergeWindow = 20 * 55 + 650;  // wave duration + last tween
        const knobWaves = 4;
        for (let w = 0; w < knobWaves; w++) {
          const waveDelay = WAVE_START + (convergeWindow * w) / knobWaves;
          for (let i = 0; i < Math.min(16, KNOBS.length); i++) {
            const deg = (rng() - 0.5) * 220;
            const jitter = i * 35;
            scheduleBeat(() => {
              if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].chapter !== 'auto-tune') return;
              rotateKnob(KNOBS[i], deg, 520);
            }, waveDelay + jitter);
          }
        }

        // After the wave completes, reveal the CONVERGED stat
        const convergedAt = WAVE_START + 20 * 55 + 600;
        scheduleBeat(() => {
          if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].chapter !== 'auto-tune') return;
          if (AUTO_TUNE_STAT_G) Tween.run(AUTO_TUNE_STAT_G, { opacity: 1 }, 500);
        }, convergedAt);
      }, 700);
    };

    // === CHAPTER 8 — objective ===
    // Pricing curve sits in Slot L (small). Parabola in Slot R with y-axis label cycling.

    const METRICS = [
      { id: 'margin',   label: 'Margin $',       peakT: 0.55, peakH: 0.85 },
      { id: 'revenue',  label: 'Revenue $',      peakT: 0.42, peakH: 0.72 },
      { id: 'ordersize',label: 'Avg Order Size', peakT: 0.65, peakH: 0.62 },
    ];

    // Build a parabola path for a given metric in Slot R.
    function parabolaPath(metric, slot) {
      const samples = 48;
      const pts = [];
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        // Downward parabola peaking at peakT, with relative height peakH
        const y = slot.y + slot.h * (1 - (1 - Math.pow((t - metric.peakT) * 2.6, 2)) * metric.peakH * 0.85) ;
        const x = slot.x + 30 + t * (slot.w - 60);
        pts.push([x, Math.max(slot.y + 20, Math.min(slot.y + slot.h - 20, y))]);
      }
      return 'M ' + pts.map(p => p.join(',')).join(' L ');
    }

    function parabolaPeak(metric, slot) {
      const samples = 48;
      let best = null;
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const y = slot.y + slot.h * (1 - (1 - Math.pow((t - metric.peakT) * 2.6, 2)) * metric.peakH * 0.85);
        const x = slot.x + 30 + t * (slot.w - 60);
        if (!best || y < best.y) best = { x, y };
      }
      return best;
    }

    let CURVE_L = null, CURVE_L_PATH = null, CURVE_L_DOT = null;
    let CURVE_L_LABEL_WRAP = null;   // (v7) wrapper <g> we can translate as curve morphs
    let CURVE_L_LABEL_T = 0.40;      // (v7) curve t-position the label is anchored to
    let PARABOLA_PATH = null, PARABOLA_DOT = null, PARABOLA_YLABEL = null, PARABOLA_XLABEL = null;
    let OBJECTIVE_CHIPS_G = null, OBJECTIVE_CHIPS = null;
    let METRIC_CYCLE_TIMER = null;
    let CURRENT_METRIC = 0;
    let OBJECTIVE_SETTLE_TIMEOUT = null;
    // --- Sigmoid (win rate) overlay + optimization sweep state ---
    let SIGMOID_CURVE = null;          // { d, sampleAt(t) }
    let SIGMOID_PATH = null;           // gray sigmoid line element
    let SIGMOID_DOT = null;            // current predicted win-rate dot
    let SIGMOID_LABEL_G = null;        // "Win Rate" label group
    let PARABOLA_ACTUAL_DOT = null;    // beat 14 — actual margin (vs predicted)
    let SIGMOID_ACTUAL_DOT = null;     // beat 14 — actual win rate
    let ACTUAL_LABEL_G = null;         // beat 14 — "ACTUAL" callout
    let PREDICTED_PARABOLA_LABEL_G = null;  // "PREDICTED" eyebrow above the parabola dot
    let PREDICTED_SIGMOID_LABEL_G  = null;  // "PREDICTED" eyebrow above the sigmoid dot
    let OBJECTIVE_OPTIMIZE_TIMERS = [];
    let OBJECTIVE_OPTIMIZE_TIMEOUT = null;

    // Sigmoid: high win rate at low price, low win rate at high price. The
    // x-axis shares the parabola's mapping so dots at the same t correspond
    // to the same price.
    function makeSigmoidCurve(slot) {
      const samples = 64;
      const pts = [];
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const xPos = slot.x + 30 + t * (slot.w - 60);
        const yNorm = 1 / (1 + Math.exp(7 * (t - 0.5)));   // ~1 at t=0, ~0 at t=1
        const yPos = slot.y + (1 - yNorm) * slot.h * 0.74 + slot.h * 0.13;
        pts.push([xPos, yPos]);
      }
      return {
        d: 'M ' + pts.map(p => p.join(',')).join(' L '),
        sampleAt(t) {
          const i = Math.round(clamp(t, 0, 1) * samples);
          return { x: pts[i][0], y: pts[i][1] };
        },
      };
    }

    // Parabola y at any t (not just peak) — used during the optimization sweep
    function parabolaPositionAtT(metric, t, slot) {
      const y = slot.y + slot.h * (1 - (1 - Math.pow((t - metric.peakT) * 2.6, 2)) * metric.peakH * 0.85);
      const x = slot.x + 30 + t * (slot.w - 60);
      return { x, y: Math.max(slot.y + 20, Math.min(slot.y + slot.h - 20, y)) };
    }

    function stopOptimizeSweep() {
      OBJECTIVE_OPTIMIZE_TIMERS.forEach(t => clearTimeout(t));
      OBJECTIVE_OPTIMIZE_TIMERS = [];
      if (OBJECTIVE_OPTIMIZE_TIMEOUT) {
        clearTimeout(OBJECTIVE_OPTIMIZE_TIMEOUT);
        OBJECTIVE_OPTIMIZE_TIMEOUT = null;
      }
    }

    function ensureObjectiveScene() {
      if (CURVE_L) return;

      // === Slot L: data-dense demand curve (same scale as beats 1/2/2b/8/10) ===
      CURVE_L = makeCurve(STAGE.L);

      const axesL = buildAxes(STAGE.L, {
        xTicks:  [0, 0.25, 0.5, 0.75, 1.0],
        yTicks:  [0, 0.25, 0.5, 0.75, 1.0],
        xLabels: ['0', '2.5k', '5k', '7.5k', '10k'],
        yLabels: ['$50', '$110', '$160', '$210', '$260'],
        xTitle:  'QUANTITY (UNITS)',
        yTitle:  'PRICE ($)',
        showGrid: true,
      });
      axesL.id = 'axes-l-curve';
      axesL.setAttribute('opacity', '0');
      LAYERS.axes.appendChild(axesL);

      CURVE_L_PATH = svg('path', {
        d: CURVE_L.d, fill: 'none', stroke: 'var(--brand-navy)', 'stroke-width': 2.5,
        opacity: 0, 'stroke-linecap': 'round',
      });
      LAYERS.curve.appendChild(CURVE_L_PATH);
      const p = CURVE_L.sampleAt(0.55);  // matches first metric (margin) peakT
      CURVE_L_DOT = svg('circle', { cx: p.x, cy: p.y, r: 7, fill: 'var(--brand-orange)', opacity: 0 });
      LAYERS.dots.appendChild(CURVE_L_DOT);

      // Modern callout wrapped in a translatable group so it can follow the
      // demand curve as it morphs (v7).
      const anchorL = CURVE_L.sampleAt(CURVE_L_LABEL_T);
      // Internal layout uses anchor-local coords: anchor sits at (0, 0).
      const offX = 28, offY = -36;
      const curveLabelL = svg('g', {
        id: 'optimal-curve-label-l-g', opacity: 0,
        transform: `translate(${anchorL.x} ${anchorL.y})`,
      });
      CURVE_L_LABEL_WRAP = curveLabelL;
      curveLabelL.appendChild(svg('line', {
        x1: 0, y1: 0,
        x2: offX - 6, y2: offY + 6,
        stroke: 'var(--brand-navy)', 'stroke-width': 1, 'stroke-opacity': 0.5,
      }));
      curveLabelL.appendChild(svg('circle', {
        cx: 0, cy: 0, r: 3, fill: 'var(--brand-navy)', 'fill-opacity': 0.7,
      }));
      const eyL = svg('text', {
        x: offX, y: offY - 4,
        'text-anchor': 'start',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 10, 'letter-spacing': '0.16em',
        'font-weight': 600, fill: 'var(--brand-orange)',
        id: 'optimal-curve-label-l',  // legacy id retained for selectors elsewhere
      });
      eyL.textContent = 'THE TARGET';
      curveLabelL.appendChild(eyL);
      const lblTextL = svg('text', {
        x: offX, y: offY + 14,
        'text-anchor': 'start',
        'font-size': 14, 'font-weight': 600, fill: 'var(--brand-navy-ink)',
        'letter-spacing': '-0.01em',
      });
      lblTextL.textContent = 'Optimal pricing curve';
      curveLabelL.appendChild(lblTextL);
      LAYERS.labels.appendChild(curveLabelL);

      // === Slot R: parabola with axes + metric chips + peak callout ===
      // Axes — Y title is dynamic; we update its text on each metric change.
      const axesR = buildAxes(STAGE.R, {
        xTicks:  [0, 0.25, 0.5, 0.75, 1.0],
        yTicks:  [],   // suppress gridlines + ticks on Y (axis just shows trend, not values)
        xLabels: ['$50', '$110', '$160', '$210', '$260'],
        yLabels: [],
        xTitle:  '',   // managed by PARABOLA_XLABEL (so feedback chapter can swap to "WIN RATE")
        yTitle:  '',
        showGrid: false,
      });
      axesR.id = 'axes-r-parabola';
      axesR.setAttribute('opacity', '0');
      LAYERS.axes.appendChild(axesR);

      // Dynamic rotated Y title (changes with active metric)
      PARABOLA_YLABEL = svg('text', {
        x: STAGE.R.x - 18, y: STAGE.R.y + STAGE.R.h / 2,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-size': 11, 'font-weight': 700,
        'letter-spacing': '0.12em',
        fill: 'var(--brand-navy-ink)', opacity: 0,
        transform: `rotate(-90 ${STAGE.R.x - 18} ${STAGE.R.y + STAGE.R.h / 2})`,
      });
      PARABOLA_YLABEL.textContent = METRICS[0].label.toUpperCase();
      LAYERS.labels.appendChild(PARABOLA_YLABEL);

      // X-axis label — dynamic; beat 11 shows "PRICE ($)", beats 12/13 swap to "WIN RATE".
      PARABOLA_XLABEL = svg('text', {
        x: STAGE.R.x + STAGE.R.w / 2, y: STAGE.R.y + STAGE.R.h + 44,
        'text-anchor': 'middle',
        'font-size': 11, 'font-weight': 600,
        'letter-spacing': '0.12em',
        fill: 'var(--brand-text)', opacity: 0,
      });
      PARABOLA_XLABEL.textContent = 'PRICE ($)';
      LAYERS.labels.appendChild(PARABOLA_XLABEL);

      // Parabola path + peak dot
      PARABOLA_PATH = svg('path', {
        d: parabolaPath(METRICS[0], STAGE.R),
        fill: 'none', stroke: 'var(--brand-navy)', 'stroke-width': 2.5, opacity: 0,
        'stroke-linecap': 'round',
      });
      LAYERS.curve.appendChild(PARABOLA_PATH);
      const peak = parabolaPeak(METRICS[0], STAGE.R);
      PARABOLA_DOT = svg('circle', { cx: peak.x, cy: peak.y, r: 8, fill: 'var(--brand-orange)', opacity: 0 });
      LAYERS.dots.appendChild(PARABOLA_DOT);

      // Modern peak callout: "PREDICTED" eyebrow + price + max metric (Margin/Revenue/Size).
      // Composed as a group so it can be repositioned wholesale as the peak moves.
      const peakG = svg('g', { id: 'optimum-peak-label', opacity: 0 });
      const peakEyebrow = svg('text', {
        x: peak.x, y: peak.y - 38,
        'text-anchor': 'middle',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 10, 'letter-spacing': '0.16em',
        'font-weight': 700, fill: 'var(--brand-orange)',
        'data-role': 'optimum-eyebrow',
      });
      peakEyebrow.textContent = 'PREDICTED';
      peakG.appendChild(peakEyebrow);
      const peakValue = svg('text', {
        x: peak.x, y: peak.y - 18,
        'text-anchor': 'middle',
        'font-size': 14, 'font-weight': 700, fill: 'var(--brand-navy-ink)',
        'letter-spacing': '-0.01em',
        'data-role': 'optimum-value',
      });
      peakValue.textContent = '$168 · max margin';
      peakG.appendChild(peakValue);
      LAYERS.labels.appendChild(peakG);

      // === Metric selector chips (above the parabola) ===
      OBJECTIVE_CHIPS_G = svg('g', { id: 'objective-chips', opacity: 0 });
      const totalChipW = STAGE.R.w * 0.86;
      const chipGap = 16;
      const chipW = (totalChipW - chipGap * 2) / 3;
      const chipH = 22;
      const chipsStartX = STAGE.R.x + (STAGE.R.w - totalChipW) / 2;
      const chipY = STAGE.R.y - 40;
      OBJECTIVE_CHIPS = [];
      METRICS.forEach((m, i) => {
        const cx = chipsStartX + i * (chipW + chipGap);
        const chipG = svg('g', { 'data-chip-idx': String(i) });
        const rect = svg('rect', {
          x: cx, y: chipY, width: chipW, height: chipH,
          rx: 2, ry: 2,
          fill: 'var(--brand-surface)',
          stroke: 'var(--brand-divider)',
          'stroke-width': 1,
          'data-role': 'chip-rect',
        });
        chipG.appendChild(rect);
        const t = svg('text', {
          x: cx + chipW / 2, y: chipY + chipH / 2 + 4,
          'text-anchor': 'middle',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 10, 'letter-spacing': '0.14em',
          'font-weight': 600, fill: 'var(--brand-text-muted)',
          'data-role': 'chip-text',
        });
        t.textContent = m.label.replace(' $', '').toUpperCase();
        chipG.appendChild(t);
        OBJECTIVE_CHIPS_G.appendChild(chipG);
        OBJECTIVE_CHIPS.push({ g: chipG, rect, text: t });
      });
      LAYERS.labels.appendChild(OBJECTIVE_CHIPS_G);

      // === SIGMOID (WIN RATE) — gray line that shares the parabola's x-axis ===
      SIGMOID_CURVE = makeSigmoidCurve(STAGE.R);
      SIGMOID_PATH = svg('path', {
        d: SIGMOID_CURVE.d,
        fill: 'none',
        stroke: '#9AA3AE',           // neutral gray
        'stroke-width': 2,
        'stroke-dasharray': '5 4',   // dashed to differentiate from the navy parabola
        'stroke-linecap': 'round',
        opacity: 0,
      });
      LAYERS.curve.appendChild(SIGMOID_PATH);

      // Win-rate dot — predicted, gray with bg-stroke halo so it reads over the line
      const sigInitial = SIGMOID_CURVE.sampleAt(METRICS[0].peakT);
      SIGMOID_DOT = svg('circle', {
        cx: sigInitial.x, cy: sigInitial.y, r: 7,
        fill: '#9AA3AE',
        stroke: 'var(--brand-bg)',
        'stroke-width': 2.5,
        opacity: 0,
      });
      LAYERS.dots.appendChild(SIGMOID_DOT);

      // "WIN RATE" inline label — leader from upper-left of sigmoid
      SIGMOID_LABEL_G = svg('g', { id: 'sigmoid-label-g', opacity: 0 });
      const wrAnchor = SIGMOID_CURVE.sampleAt(0.18);
      const wrLx = wrAnchor.x + 14;
      const wrLy = wrAnchor.y - 32;
      SIGMOID_LABEL_G.appendChild(svg('line', {
        x1: wrAnchor.x, y1: wrAnchor.y,
        x2: wrLx - 4, y2: wrLy + 4,
        stroke: '#9AA3AE', 'stroke-width': 1, 'stroke-opacity': 0.7,
      }));
      const wrEy = svg('text', {
        x: wrLx, y: wrLy - 4,
        'text-anchor': 'start',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 10, 'letter-spacing': '0.16em',
        'font-weight': 600, fill: 'var(--brand-text-muted)',
      });
      wrEy.textContent = 'PREDICTED';
      SIGMOID_LABEL_G.appendChild(wrEy);
      const wrLbl = svg('text', {
        x: wrLx, y: wrLy + 14,
        'text-anchor': 'start',
        'font-size': 14, 'font-weight': 600, fill: 'var(--brand-text)',
        'letter-spacing': '-0.01em',
      });
      wrLbl.textContent = 'Win rate';
      SIGMOID_LABEL_G.appendChild(wrLbl);
      LAYERS.labels.appendChild(SIGMOID_LABEL_G);

      // === BEAT 14 (feedback) — actual dots + ACTUAL callout ===
      // Predicted: model's expected (margin, win rate) at the chosen price.
      // Actual:    real-world result after taking it to market — slightly off.
      // We start both invisible; beat 14 reveals them.
      const peakInit = parabolaPeak(METRICS[0], STAGE.R);
      // Actual margin: slightly LOWER (real demand softer than predicted) and a
      // little to the RIGHT (we ended up selling at slightly higher price).
      const peakInitT = METRICS[0].peakT;
      const actualT = peakInitT + 0.06;
      const actualMargin = parabolaPositionAtT(METRICS[0], actualT, STAGE.R);
      // Pull the actual point off the curve a touch so it visibly reads as a
      // distinct observation, not a sample on the parabola.
      const ACTUAL_MARGIN_OFFSET_Y = 22;   // pixels DOWN (lower margin than predicted)
      const actualMarginPt = { x: actualMargin.x, y: actualMargin.y + ACTUAL_MARGIN_OFFSET_Y };
      PARABOLA_ACTUAL_DOT = svg('circle', {
        cx: actualMarginPt.x, cy: actualMarginPt.y, r: 7,
        fill: 'var(--brand-navy)',
        stroke: 'var(--brand-bg)',
        'stroke-width': 2.5,
        opacity: 0,
      });
      LAYERS.dots.appendChild(PARABOLA_ACTUAL_DOT);
      // Actual win rate: slightly LOWER on the sigmoid (real-world win rate was
      // worse than the model thought).
      const actualSig = SIGMOID_CURVE.sampleAt(actualT);
      SIGMOID_ACTUAL_DOT = svg('circle', {
        cx: actualSig.x, cy: actualSig.y + 16, r: 7,
        fill: 'var(--brand-navy)',
        stroke: 'var(--brand-bg)',
        'stroke-width': 2.5,
        opacity: 0,
      });
      LAYERS.dots.appendChild(SIGMOID_ACTUAL_DOT);

      // "ACTUAL" eyebrow callout next to the actual margin dot
      ACTUAL_LABEL_G = svg('g', { id: 'actual-label-g', opacity: 0 });
      // v9 feedback: shifted DOWN-LEFT of the dot so the label sits well below
      // the descending parabola tail (previously the text was crossing the curve).
      const aLx = actualMarginPt.x - 60;
      const aLy = actualMarginPt.y + 96;
      ACTUAL_LABEL_G.appendChild(svg('line', {
        x1: actualMarginPt.x, y1: actualMarginPt.y + 7,
        x2: aLx + 18, y2: aLy - 18,
        stroke: 'var(--brand-navy)', 'stroke-width': 1, 'stroke-opacity': 0.6,
      }));
      const aEy = svg('text', {
        x: aLx, y: aLy - 10,
        'text-anchor': 'start',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 10, 'letter-spacing': '0.16em',
        'font-weight': 700, fill: 'var(--brand-navy)',
      });
      aEy.textContent = 'ACTUAL';
      ACTUAL_LABEL_G.appendChild(aEy);
      const aLbl = svg('text', {
        x: aLx, y: aLy + 6,
        'text-anchor': 'start',
        'font-size': 13, 'font-weight': 600, fill: 'var(--brand-navy-ink)',
      });
      aLbl.textContent = 'Lower than predicted.';
      ACTUAL_LABEL_G.appendChild(aLbl);
      LAYERS.labels.appendChild(ACTUAL_LABEL_G);
    }

    // Map a metric's peakT (parabola x position) to a $ price value.
    // X-axis range is $50-$260 (5 ticks at 0/0.25/0.5/0.75/1.0).
    function metricPeakPrice(peakT) {
      return Math.round((50 + peakT * (260 - 50)) / 2) * 2;  // round to nearest $2
    }

    // Update active chip styling
    function setActiveChip(idx) {
      if (!OBJECTIVE_CHIPS) return;
      OBJECTIVE_CHIPS.forEach((c, i) => {
        if (i === idx) {
          c.rect.setAttribute('fill', 'var(--brand-orange)');
          c.rect.setAttribute('stroke', 'var(--brand-orange)');
          c.text.setAttribute('fill', '#fff');
          c.text.setAttribute('font-weight', '700');
        } else {
          c.rect.setAttribute('fill', 'var(--brand-surface)');
          c.rect.setAttribute('stroke', 'var(--brand-divider)');
          c.text.setAttribute('fill', 'var(--brand-text-muted)');
          c.text.setAttribute('font-weight', '600');
        }
      });
    }

    function cycleMetric() {
      CURRENT_METRIC = (CURRENT_METRIC + 1) % METRICS.length;
      const m = METRICS[CURRENT_METRIC];
      // Y-axis title tracks the active metric.
      PARABOLA_YLABEL.textContent = 'PREDICTED ' + m.label.toUpperCase();
      // Parabola path morphs (snap), peak dot tweens.
      PARABOLA_PATH.setAttribute('d', parabolaPath(m, STAGE.R));
      const peak = parabolaPeak(m, STAGE.R);
      Tween.run(PARABOLA_DOT, { cx: peak.x, cy: peak.y, opacity: 1 }, 600);
      // Sigmoid dot tracks the parabola peak's x position (same price)
      if (SIGMOID_DOT && SIGMOID_CURVE) {
        const sp = SIGMOID_CURVE.sampleAt(m.peakT);
        Tween.run(SIGMOID_DOT, { cx: sp.x, cy: sp.y, opacity: 1 }, 600);
      }
      // Peak callout group: move with peak, update text.
      const peakG = document.getElementById('optimum-peak-label');
      if (peakG) {
        const eyebrow = peakG.querySelector('[data-role="optimum-eyebrow"]');
        const value = peakG.querySelector('[data-role="optimum-value"]');
        if (eyebrow) Tween.run(eyebrow, { x: peak.x, y: peak.y - 38, opacity: 1 }, 600);
        if (value) {
          Tween.run(value, { x: peak.x, y: peak.y - 18, opacity: 1 }, 600);
          const metricShort = m.label.replace(' $', '').toLowerCase();
          value.textContent = '$' + metricPeakPrice(m.peakT) + '  ·  max ' + metricShort;
        }
      }
      // Active chip
      setActiveChip(CURRENT_METRIC);
      // Slot L curve dot tracks the parabola peak's t-value.
      if (CURVE_L_DOT && CURVE_L) {
        const lp = CURVE_L.sampleAt(m.peakT);
        Tween.run(CURVE_L_DOT, { cx: lp.x, cy: lp.y }, 600);
      }
    }

    function startMetricCycle() {
      stopMetricCycle();
      METRIC_CYCLE_TIMER = setInterval(cycleMetric, 1500);
    }
    function stopMetricCycle() {
      if (METRIC_CYCLE_TIMER) { clearInterval(METRIC_CYCLE_TIMER); METRIC_CYCLE_TIMER = null; }
      if (OBJECTIVE_SETTLE_TIMEOUT) { clearTimeout(OBJECTIVE_SETTLE_TIMEOUT); OBJECTIVE_SETTLE_TIMEOUT = null; }
    }

    CHAPTERS['objective'] = function(beat, prevBeat) {
      ensureObjectiveScene();

      // Restore knob layer (in case chapter 7 shrunk it)
      LAYERS.knobs.setAttribute('transform', '');
      stopOptimizeSweep();

      // Hide chapter 7 visuals: big curve, dots
      if (CURVE_PATH_EL) Tween.run(CURVE_PATH_EL, { opacity: 0 }, 400);
      if (CURVE_LABEL_G) Tween.run(CURVE_LABEL_G, { opacity: 0 }, 400);
      const axes = document.getElementById('axes-c');
      if (axes) Tween.run(axes, { opacity: 0 }, 300);
      DOTS.forEach(d => Tween.run(d, { opacity: 0 }, 300));
      // Hide all knobs for this beat
      KNOBS.forEach(k => Tween.run(k.g, { opacity: 0 }, 300));

      // Hide beat-14 "actual" chrome by default — only feedback beats show it
      if (PARABOLA_ACTUAL_DOT) Tween.run(PARABOLA_ACTUAL_DOT, { opacity: 0 }, 200);
      if (SIGMOID_ACTUAL_DOT)  Tween.run(SIGMOID_ACTUAL_DOT, { opacity: 0 }, 200);
      if (ACTUAL_LABEL_G)      Tween.run(ACTUAL_LABEL_G, { opacity: 0 }, 200);

      // Show small curve in Slot L
      const axesLEl = document.getElementById('axes-l-curve');
      if (axesLEl) Tween.run(axesLEl, { opacity: 1 }, 400);
      Tween.run(CURVE_L_PATH, { opacity: 1 }, 500);
      Tween.run(CURVE_L_DOT, { opacity: 1 }, 500);
      const lLblG = document.getElementById('optimal-curve-label-l-g');
      if (lLblG) Tween.run(lLblG, { opacity: 1 }, 500);

      // Reset demand curve to baseline (in case prior visit morphed it)
      morphCurveL(6, 0, 0);

      // Show parabola + sigmoid + axes in Slot R
      const axesREl = document.getElementById('axes-r-parabola');
      if (axesREl) Tween.run(axesREl, { opacity: 1 }, 400);
      Tween.run(PARABOLA_PATH, { opacity: 1 }, 600);
      Tween.run(PARABOLA_DOT, { opacity: 1 }, 600);
      Tween.run(PARABOLA_YLABEL, { opacity: 1 }, 400);
      Tween.run(PARABOLA_XLABEL, { opacity: 1 }, 400);
      // Sigmoid (win rate) — reveals together with the parabola
      if (SIGMOID_PATH)    Tween.run(SIGMOID_PATH, { opacity: 0.85 }, 700);
      if (SIGMOID_DOT)     Tween.run(SIGMOID_DOT, { opacity: 1 }, 700);
      if (SIGMOID_LABEL_G) Tween.run(SIGMOID_LABEL_G, { opacity: 1 }, 700);
      const peakLbl = document.getElementById('optimum-peak-label');
      if (peakLbl) Tween.run(peakLbl, { opacity: 1 }, 600);
      // === V6: Margin-only — hide Revenue + Avg Order Size chips, lock on Margin ===
      if (OBJECTIVE_CHIPS_G) Tween.run(OBJECTIVE_CHIPS_G, { opacity: 1 }, 400);
      if (OBJECTIVE_CHIPS) {
        OBJECTIVE_CHIPS.forEach((c, i) => {
          c.g.setAttribute('opacity', i === 0 ? '1' : '0');
        });
      }
      PARABOLA_XLABEL.textContent = 'PRICE ($)';

      // === V6: Skip the metric cycle entirely — commit to margin and start the sweep. ===
      stopMetricCycle();
      CURRENT_METRIC = 0;
      PARABOLA_YLABEL.textContent = 'PREDICTED ' + METRICS[0].label.toUpperCase();
      PARABOLA_PATH.setAttribute('d', parabolaPath(METRICS[0], STAGE.R));
      setActiveChip(0);
      if (OBJECTIVE_SETTLE_TIMEOUT) clearTimeout(OBJECTIVE_SETTLE_TIMEOUT);
      // v9 feedback: hold the optimization sweep (curve shifting + win-rate/margin
      // shifting) until AFTER the "What are we optimizing for?" transition overlay
      // has faded (overlay auto-dismisses at 2600ms — start the sweep just after).
      OBJECTIVE_SETTLE_TIMEOUT = scheduleBeat(() => {
        OBJECTIVE_SETTLE_TIMEOUT = null;
        // Start the optimization sweep from an off-peak guess. The sweep
        // also morphs the slot-L demand curve at each step so the left
        // chart visibly reshapes as the model explores prices (v5 feedback).
        runOptimizeSweep(0.30);
      }, 2800);
    };

    // Sweep the predicted dots through a sequence of price guesses that
    // converge on the parabola peak. The left-curve dot moves in lockstep,
    // making it read as "we're trying different prices on the demand curve
    // and watching predicted margin + win rate respond".
    function runOptimizeSweep(startT) {
      stopOptimizeSweep();
      const peakT = METRICS[0].peakT;
      // Hand-tuned sequence that overshoots a bit before landing (feels like a
      // real optimization, not a straight line). Ends at the parabola peak.
      const seq = [startT, startT + 0.10, startT + 0.06, startT + 0.18, peakT - 0.04, peakT + 0.03, peakT];
      // V7: matching demand-curve shape per step — the curve shifts (steeper/
      // shallower, slightly higher/lower) as the model explores prices. Amplitudes
      // increased so the shifts read as distinct, not subtle.
      const curveShapes = [
        { steepness: 3.0, lift:  0.12 },
        { steepness: 4.0, lift:  0.08 },
        { steepness: 3.4, lift:  0.10 },
        { steepness: 5.0, lift: -0.04 },
        { steepness: 6.6, lift: -0.07 },
        { steepness: 6.0, lift:  0.00 },
        { steepness: 6.0, lift:  0.00 },   // settled
      ];
      const STEP_MS = 850;
      function stepTo(t, isLast, shape) {
        if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].chapter !== 'objective') return;
        // V6: morph the demand curve to the step's shape FIRST so the dot
        // lands on the new curve at the new t.
        morphCurveL(shape.steepness, shape.lift, STEP_MS - 100);
        // Parabola dot (current predicted margin at this price)
        const ppos = parabolaPositionAtT(METRICS[0], t, STAGE.R);
        Tween.run(PARABOLA_DOT, { cx: ppos.x, cy: ppos.y }, STEP_MS - 100);
        // Sigmoid dot (current predicted win rate at this price)
        if (SIGMOID_DOT && SIGMOID_CURVE) {
          const sp = SIGMOID_CURVE.sampleAt(t);
          Tween.run(SIGMOID_DOT, { cx: sp.x, cy: sp.y }, STEP_MS - 100);
        }
        // Left-curve dot — moves to the matching (price, quantity) on the
        // (now-reshaped) demand curve. We sample at the END of the morph by
        // using the parameter target shape's sampler, so the dot lands on
        // where the curve will be when the morph completes.
        if (CURVE_L_DOT) {
          const targetCurve = makeCurveParam(STAGE.L, { steepness: shape.steepness, lift: shape.lift });
          const lp = targetCurve.sampleAt(t);
          Tween.run(CURVE_L_DOT, { cx: lp.x, cy: lp.y }, STEP_MS - 100);
        }
        // Peak callout follows ONLY when we land (rest of the sweep is exploratory)
        if (isLast) {
          const peakLbl = document.getElementById('optimum-peak-label');
          if (peakLbl) {
            const eyebrow = peakLbl.querySelector('[data-role="optimum-eyebrow"]');
            const value = peakLbl.querySelector('[data-role="optimum-value"]');
            if (eyebrow) Tween.run(eyebrow, { x: ppos.x, y: ppos.y - 38, opacity: 1 }, STEP_MS - 100);
            if (value) {
              Tween.run(value, { x: ppos.x, y: ppos.y - 18, opacity: 1 }, STEP_MS - 100);
              value.textContent = '$' + metricPeakPrice(t) + '  ·  max margin';
            }
          }
        } else {
          // Hide the peak callout while sweeping — it'll reappear at landing
          const peakLbl = document.getElementById('optimum-peak-label');
          if (peakLbl) Tween.run(peakLbl, { opacity: 0 }, 250);
        }
      }
      seq.forEach((t, i) => {
        const isLast = i === seq.length - 1;
        const shape = curveShapes[i] || curveShapes[curveShapes.length - 1];
        const timer = scheduleBeat(() => stepTo(t, isLast, shape), i * STEP_MS);
        OBJECTIVE_OPTIMIZE_TIMERS.push(timer);
      });
    }

    // === CHAPTER 9 — market feedback loop ===

    let FEEDBACK_ARROW = null;
    let MONTH_TICKER = null;
    let MONTH_TIMER = null;

    function ensureFeedbackScene() {
      if (FEEDBACK_ARROW) return;
      // Dashed feedback arrow: knob grid (lower-left of slot R) → CURVE_L_DOT (model input).
      // The knob grid sits at SVG (557,487)–(661,556). The CURVE_L_DOT sits ~ (287.5, 433.5).
      // Arrow starts at knob grid's left-center and curves to the dot on the left curve.
      const pStart = { x: 557, y: 522 };
      const pEnd   = { x: 300, y: 433 };
      const pMid   = { x: (pStart.x + pEnd.x) / 2, y: pStart.y + 60 };
      FEEDBACK_ARROW = svg('path', {
        d: `M ${pStart.x},${pStart.y} Q ${pMid.x},${pMid.y} ${pEnd.x},${pEnd.y}`,
        fill: 'none', stroke: 'var(--brand-navy)', 'stroke-width': 2,
        'stroke-dasharray': '6 5', 'marker-end': 'url(#feedback-arrowhead)', opacity: 0,
      });
      // Arrowhead marker
      let defs = $stage.querySelector('defs');
      if (!defs) { defs = svg('defs'); $stage.insertBefore(defs, $stage.firstChild); }
      const marker = svg('marker', {
        id: 'feedback-arrowhead', viewBox: '0 0 10 10',
        refX: '8', refY: '5', markerWidth: '6', markerHeight: '6', orient: 'auto-start-reverse',
      });
      const tri = svg('path', { d: 'M 0,0 L 10,5 L 0,10 z', fill: 'var(--brand-navy)' });
      marker.appendChild(tri); defs.appendChild(marker);
      LAYERS.overlay.appendChild(FEEDBACK_ARROW);

      // Month ticker (beat 13)
      MONTH_TICKER = svg('text', {
        x: STAGE.W - 30, y: 42,
        'text-anchor': 'end', 'font-size': 14, 'font-weight': 600,
        fill: 'var(--brand-text-muted)', opacity: 0,
      });
      MONTH_TICKER.textContent = 'Jan 2026';
      LAYERS.overlay.appendChild(MONTH_TICKER);
    }

    function showSmallKnobs(visible) {
      // Place the 4×4 knob grid in the lower-left of slot R, OUTSIDE the parabola's
      // drawing area. The parabola is flat (y≈540) for x∈[605, 683] and ascends
      // beyond x=683. The grid sits below the parabola's flat base at SVG ~(557, 487)–(661, 556).
      // Native grid bbox starts at local (77, 105), so translate compensates.
      const target = visible ? 'translate(545, 470) scale(0.16)' : '';
      LAYERS.knobs.setAttribute('transform', target);
      KNOBS.forEach((k, i) => {
        // Show first 16, hide above
        if (i < 16) Tween.run(k.g, { opacity: visible ? 1 : 0 }, 400);
      });
    }

    function startMonthTicker(onStep, onDone) {
      const months = ['Feb 2026', 'Mar 2026', 'Apr 2026', 'May 2026', 'Jun 2026'];
      if (MONTH_TIMER) clearInterval(MONTH_TIMER);
      let i = 0;
      MONTH_TICKER.textContent = 'Jan 2026';
      Tween.run(MONTH_TICKER, { opacity: 1 }, 200);
      onStep(0);
      // v8: snap mode (backward / jump) — flush all months synchronously so the
      // ticker lands on the final month and the dot/curve land on the final
      // shape, no interval, no animation.
      if (APP.snapMode) {
        for (let j = 0; j < months.length; j++) {
          MONTH_TICKER.textContent = months[j];
          onStep(j + 1);
        }
        if (onDone) onDone();
        return;
      }
      MONTH_TIMER = setInterval(() => {
        if (i >= months.length) {
          clearInterval(MONTH_TIMER); MONTH_TIMER = null;
          if (onDone) onDone();
          return;
        }
        MONTH_TICKER.textContent = months[i];
        onStep(i + 1);
        i++;
      }, 850);
    }
    function stopMonthTicker() {
      if (MONTH_TIMER) { clearInterval(MONTH_TIMER); MONTH_TIMER = null; }
    }

    CHAPTERS['feedback'] = function(beat, prevBeat) {
      ensureFeedbackScene();
      ensureObjectiveScene();
      stopOptimizeSweep();

      // Hide slot-C chrome from auto-tune (the big demand curve + axes).
      // If user navigated auto-tune → feedback directly (skipping objective),
      // these were never cleaned up; feedback needs its own clear slate.
      if (CURVE_PATH_EL) Tween.run(CURVE_PATH_EL, { opacity: 0 }, 300);
      if (CURVE_LABEL_G) Tween.run(CURVE_LABEL_G, { opacity: 0 }, 300);
      const _axesCFb = document.getElementById('axes-c');
      if (_axesCFb) Tween.run(_axesCFb, { opacity: 0 }, 300);
      const _autoTuneStat = document.getElementById('auto-tune-stat');
      if (_autoTuneStat) Tween.run(_autoTuneStat, { opacity: 0 }, 300);
      KNOBS.forEach(k => Tween.run(k.g, { opacity: 0 }, 300));

      // Both feedback beats: small curve in Slot L (continued from beat 11),
      // parabola + sigmoid in Slot R.
      const axesLEl = document.getElementById('axes-l-curve');
      if (axesLEl) Tween.run(axesLEl, { opacity: 1 }, 300);
      Tween.run(CURVE_L_PATH, { opacity: 1 }, 300);
      Tween.run(CURVE_L_DOT, { opacity: 1 }, 300);
      const lLblG = document.getElementById('optimal-curve-label-l-g');
      if (lLblG) Tween.run(lLblG, { opacity: 1 }, 300);
      const axesREl = document.getElementById('axes-r-parabola');
      if (axesREl) Tween.run(axesREl, { opacity: 1 }, 300);
      Tween.run(PARABOLA_PATH, { opacity: 1 }, 300);
      Tween.run(PARABOLA_DOT, { opacity: 1 }, 300);
      Tween.run(PARABOLA_YLABEL, { opacity: 1 }, 300);
      Tween.run(PARABOLA_XLABEL, { opacity: 1 }, 300);
      // Sigmoid (win rate) stays in for both feedback beats
      if (SIGMOID_PATH)    Tween.run(SIGMOID_PATH, { opacity: 0.85 }, 300);
      if (SIGMOID_DOT)     Tween.run(SIGMOID_DOT, { opacity: 1 }, 300);
      if (SIGMOID_LABEL_G) Tween.run(SIGMOID_LABEL_G, { opacity: 1 }, 300);
      const peakLbl = document.getElementById('optimum-peak-label');
      if (peakLbl) Tween.run(peakLbl, { opacity: 1 }, 300);
      // Show metric chips locked on Margin (the choice we settled on)
      if (OBJECTIVE_CHIPS_G) Tween.run(OBJECTIVE_CHIPS_G, { opacity: 1 }, 300);
      // V6: Margin-only — hide Revenue + Avg Order Size chip groups
      if (OBJECTIVE_CHIPS) {
        OBJECTIVE_CHIPS.forEach((c, i) => {
          c.g.setAttribute('opacity', i === 0 ? '1' : '0');
        });
      }
      if (typeof setActiveChip === 'function') setActiveChip(0);

      // Hide stray dots — keep only the dots that belong on this scene
      for (let i = 0; i < DOTS.length; i++) {
        if (DOTS[i] !== CURVE_L_DOT && DOTS[i] !== PARABOLA_DOT &&
            DOTS[i] !== SIGMOID_DOT && DOTS[i] !== PARABOLA_ACTUAL_DOT &&
            DOTS[i] !== SIGMOID_ACTUAL_DOT) {
          if (parseFloat(DOTS[i].getAttribute('opacity')) > 0) {
            Tween.run(DOTS[i], { opacity: 0 }, 200);
          }
        }
      }

      // Lock the parabola + sigmoid on Margin (we should be settled here)
      stopMetricCycle();
      PARABOLA_YLABEL.textContent = 'PREDICTED ' + METRICS[0].label.toUpperCase();
      PARABOLA_PATH.setAttribute('d', parabolaPath(METRICS[0], STAGE.R));
      const peak = parabolaPeak(METRICS[0], STAGE.R);
      PARABOLA_DOT.setAttribute('cx', peak.x);
      PARABOLA_DOT.setAttribute('cy', peak.y);
      if (SIGMOID_DOT && SIGMOID_CURVE) {
        const sp = SIGMOID_CURVE.sampleAt(METRICS[0].peakT);
        SIGMOID_DOT.setAttribute('cx', sp.x);
        SIGMOID_DOT.setAttribute('cy', sp.y);
      }
      const peakLblSettled = document.getElementById('optimum-peak-label');
      if (peakLblSettled) {
        const eyebrow = peakLblSettled.querySelector('[data-role="optimum-eyebrow"]');
        const value = peakLblSettled.querySelector('[data-role="optimum-value"]');
        if (eyebrow) { eyebrow.setAttribute('x', peak.x); eyebrow.setAttribute('y', peak.y - 38); }
        if (value) {
          value.setAttribute('x', peak.x); value.setAttribute('y', peak.y - 18);
          value.textContent = '$' + metricPeakPrice(METRICS[0].peakT) + '  ·  max margin';
        }
      }
      // Slot L dot tracks Margin's peak position
      if (CURVE_L_DOT && CURVE_L) {
        const lp = CURVE_L.sampleAt(METRICS[0].peakT);
        CURVE_L_DOT.setAttribute('cx', lp.x);
        CURVE_L_DOT.setAttribute('cy', lp.y);
      }

      if (beat.storyId === '12') {
        // V6: Reset demand curve to baseline (in case retreating from beat 13's market shift)
        morphCurveL(6, 0, 500);
        // Re-anchor the slot-L dot to the optimal price on the baseline curve
        if (CURVE_L_DOT) {
          const _baseline = makeCurveParam(STAGE.L, { steepness: 6, lift: 0 });
          const _lp = _baseline.sampleAt(METRICS[0].peakT);
          Tween.run(CURVE_L_DOT, { cx: _lp.x, cy: _lp.y }, 500);
        }
        // KEEP x-axis as 'PRICE ($)' — both curves are functions of price.
        PARABOLA_XLABEL.textContent = 'PRICE ($)';
        // Show actual dots + actual callout (slightly offset from predicted)
        if (PARABOLA_ACTUAL_DOT) Tween.run(PARABOLA_ACTUAL_DOT, { opacity: 1 }, 600);
        if (SIGMOID_ACTUAL_DOT)  Tween.run(SIGMOID_ACTUAL_DOT, { opacity: 1 }, 600);
        if (ACTUAL_LABEL_G)      Tween.run(ACTUAL_LABEL_G, { opacity: 1 }, 700);
        // V7: knob grid + feedback arrow removed per feedback.
        showSmallKnobs(false);
        Tween.run(FEEDBACK_ARROW, { opacity: 0 }, 200);
        Tween.run(MONTH_TICKER, { opacity: 0 }, 200);
        stopMonthTicker();
        $replay.classList.remove('is-visible');
      } else if (beat.storyId === '13') {
        PARABOLA_XLABEL.textContent = 'PRICE ($)';
        // V7: knob grid + feedback arrow removed per feedback.
        showSmallKnobs(false);
        Tween.run(FEEDBACK_ARROW, { opacity: 0 }, 200);
        if (PARABOLA_ACTUAL_DOT) Tween.run(PARABOLA_ACTUAL_DOT, { opacity: 0 }, 200);
        if (SIGMOID_ACTUAL_DOT)  Tween.run(SIGMOID_ACTUAL_DOT, { opacity: 0 }, 200);
        if (ACTUAL_LABEL_G)      Tween.run(ACTUAL_LABEL_G, { opacity: 0 }, 200);

        // Run the month ticker animation: 5 steps, demand curve drifts, knobs re-spin, dot follows.
        runMarketShift();
        $replay.classList.add('is-visible');
      } else {
        $replay.classList.remove('is-visible');
      }
    };

    function runMarketShift() {
      // 5 steps, each ~850ms: shift CURVE_L shape + dot, re-spin knobs, move parabola + sigmoid dots.
      const rng = seededRng(1217);
      // V7: per-step demand curve shapes — the curve visibly reshapes month
      // by month, representing demand drifting and the model retuning. Amplitudes
      // increased over v6 so the shifts are clearly visible.
      const marketShapes = [
        { steepness: 6.0, lift:  0.00 },   // baseline
        { steepness: 4.4, lift:  0.09 },   // demand softens (curve droops)
        { steepness: 3.4, lift:  0.13 },   // softer still
        { steepness: 4.2, lift:  0.07 },   // partial recovery
        { steepness: 6.8, lift: -0.05 },   // demand picks up (curve lifts)
        { steepness: 8.0, lift: -0.09 },   // strongest
      ];
      startMonthTicker((stepIdx) => {
        if (stepIdx === 0) return;
        const shape = marketShapes[stepIdx] || marketShapes[marketShapes.length - 1];
        // Morph the demand curve to its new shape for this month.
        morphCurveL(shape.steepness, shape.lift, 700);
        const t = clamp(0.5 + (stepIdx - 3) * 0.06 + (rng() - 0.5) * 0.05, 0.15, 0.85);
        // Sample the dot's position on the TARGET curve so it lands on the
        // newly-reshaped curve, not on the prior baseline.
        const targetCurve = makeCurveParam(STAGE.L, { steepness: shape.steepness, lift: shape.lift });
        const p = targetCurve.sampleAt(t);
        Tween.run(CURVE_L_DOT, { cx: p.x, cy: p.y }, 700);
        // Parabola + sigmoid dots track the new t (predicted margin + win rate)
        const ppos = parabolaPositionAtT(METRICS[0], t, STAGE.R);
        Tween.run(PARABOLA_DOT, { cx: ppos.x, cy: ppos.y }, 700);
        if (SIGMOID_DOT && SIGMOID_CURVE) {
          const sp = SIGMOID_CURVE.sampleAt(t);
          Tween.run(SIGMOID_DOT, { cx: sp.x, cy: sp.y }, 700);
        }
        // V7: knob grid removed in feedback chapter \u2014 no re-spin here.
      }, () => { /* done */ });
    }

    // Replay button wiring
    const $replay = document.getElementById('replay');
    $replay.addEventListener('click', () => {
      if (BEATS[APP.currentBeat].storyId === '13') {
        stopMonthTicker();
        runMarketShift();
      }
    });

    // === CLOSING ===
    const $closing = document.getElementById('closing-overlay');

    CHAPTERS['closing'] = function(beat, prevBeat) {
      // Hide everything stage-side; show the closing overlay
      stopMetricCycle();
      stopMonthTicker();

      // Hide all SVG content
      DOTS.forEach(d => Tween.run(d, { opacity: 0 }, 300));
      if (CURVE_PATH_EL) Tween.run(CURVE_PATH_EL, { opacity: 0 }, 300);
      if (CURVE_LABEL_G) Tween.run(CURVE_LABEL_G, { opacity: 0 }, 300);
      if (CURVE_L_PATH) Tween.run(CURVE_L_PATH, { opacity: 0 }, 300);
      if (CURVE_L_DOT)  Tween.run(CURVE_L_DOT, { opacity: 0 }, 300);
      if (SMALL_CURVE_PATH) Tween.run(SMALL_CURVE_PATH, { opacity: 0 }, 300);
      if (SMALL_CURVE_DOT)  Tween.run(SMALL_CURVE_DOT, { opacity: 0 }, 300);
      const _axesRSmall = document.getElementById('axes-r-small');
      if (_axesRSmall) Tween.run(_axesRSmall, { opacity: 0 }, 300);
      const _curveLblRG = document.getElementById('curve-label-r-g');
      if (_curveLblRG) Tween.run(_curveLblRG, { opacity: 0 }, 300);
      const _dotStat = document.getElementById('small-curve-dot-stat');
      if (_dotStat) Tween.run(_dotStat, { opacity: 0 }, 300);
      const lLbl = document.getElementById('optimal-curve-label-l');
      if (lLbl) Tween.run(lLbl, { opacity: 0 }, 300);
      const parabolaLbl = document.getElementById('optimum-peak-label');
      if (parabolaLbl) Tween.run(parabolaLbl, { opacity: 0 }, 300);
      if (PARABOLA_PATH) Tween.run(PARABOLA_PATH, { opacity: 0 }, 300);
      if (PARABOLA_DOT) Tween.run(PARABOLA_DOT, { opacity: 0 }, 300);
      if (PARABOLA_YLABEL) Tween.run(PARABOLA_YLABEL, { opacity: 0 }, 300);
      if (PARABOLA_XLABEL) Tween.run(PARABOLA_XLABEL, { opacity: 0 }, 300);
      if (SIGMOID_PATH) Tween.run(SIGMOID_PATH, { opacity: 0 }, 300);
      if (SIGMOID_DOT) Tween.run(SIGMOID_DOT, { opacity: 0 }, 300);
      if (SIGMOID_LABEL_G) Tween.run(SIGMOID_LABEL_G, { opacity: 0 }, 300);
      if (PARABOLA_ACTUAL_DOT) Tween.run(PARABOLA_ACTUAL_DOT, { opacity: 0 }, 300);
      if (SIGMOID_ACTUAL_DOT)  Tween.run(SIGMOID_ACTUAL_DOT, { opacity: 0 }, 300);
      if (ACTUAL_LABEL_G)      Tween.run(ACTUAL_LABEL_G, { opacity: 0 }, 300);
      if (FEEDBACK_ARROW) Tween.run(FEEDBACK_ARROW, { opacity: 0 }, 300);
      if (MONTH_TICKER) Tween.run(MONTH_TICKER, { opacity: 0 }, 300);
      KNOBS.forEach(k => Tween.run(k.g, { opacity: 0 }, 300));
      if (GRID_FRAMES) GRID_FRAMES.forEach(g => Tween.run(g, { opacity: 0 }, 300));
      if (GRID_BADGES) GRID_BADGES.forEach(g => Tween.run(g, { opacity: 0 }, 300));
      if (GRID_LABELS) GRID_LABELS.forEach(g => Tween.run(g, { opacity: 0 }, 300));
      if (GRID_PRICE_HINTS) GRID_PRICE_HINTS.forEach(g => Tween.run(g, { opacity: 0 }, 300));
      if (GRID_MINI_LABELS) GRID_MINI_LABELS.forEach(g => Tween.run(g, { opacity: 0 }, 300));
      if (GRID_SIG_ANNO) Tween.run(GRID_SIG_ANNO, { opacity: 0 }, 300);
      if (GRID_NOISE_ANNO) Tween.run(GRID_NOISE_ANNO, { opacity: 0 }, 300);
      if (REGION_LEGEND_EL) Tween.run(REGION_LEGEND_EL, { opacity: 0 }, 300);
      const axes = document.getElementById('axes-c');
      if (axes) Tween.run(axes, { opacity: 0 }, 300);

      // Show closing overlay
      $closing.classList.add('is-visible');
      $closing.setAttribute('aria-hidden', 'false');
      // Focus the CTA after the overlay fades in (small delay to avoid focus-on-hidden-element)
      scheduleBeat(() => {
        const cta = document.getElementById('closing-cta');
        if (cta) cta.focus();
      }, 450);
    };

    // === SEGMENTED PROGRESS BAR ===
    // Builds one cell per chapter. Each chapter's cell is subdivided into
    // sub-cells (one per beat in that chapter). Click any chapter cell to
    // jump to its first beat; click a sub-cell to jump to that beat.
    const PROGRESS_CHAPTERS = (() => {
      const order = [
        'optimal-curve', 'capture', 'raw-scatter', 'regions', 'grid',
        'knobs-few', 'knobs-many', 'auto-tune', 'objective', 'feedback',
      ];
      const labels = {
        'optimal-curve': 'Curve',
        'capture':       'Impact',
        'raw-scatter':   'Data',
        'regions':       'Discover',
        'grid':          'Drivers',
        'knobs-few':     'Knobs',
        'knobs-many':    'Many',
        'auto-tune':     'Auto-tune',
        'objective':     'Objective',
        'feedback':      'Feedback',
      };
      return order.map(ch => ({
        chapter: ch,
        label: labels[ch],
        beatIndices: BEATS
          .filter(b => b.chapter === ch)
          .map(b => b.idx),
      }));
    })();

    function buildDotRow() {
      const ul = document.getElementById('progress');
      ul.innerHTML = '';
      PROGRESS_CHAPTERS.forEach((ch, ci) => {
        const li = document.createElement('li');
        li.dataset.chapter = ch.chapter;
        const track = document.createElement('div');
        track.className = 'seg-track';
        ch.beatIndices.forEach((beatIdx) => {
          const cell = document.createElement('div');
          cell.className = 'seg-cell';
          cell.dataset.idx = String(beatIdx);
          cell.addEventListener('click', (e) => { e.stopPropagation(); setBeat(beatIdx); });
          track.appendChild(cell);
        });
        const label = document.createElement('div');
        label.className = 'seg-label';
        label.textContent = ch.label;
        li.appendChild(track);
        li.appendChild(label);
        li.addEventListener('click', () => setBeat(ch.beatIndices[0]));
        ul.appendChild(li);
      });
    }

    let renderDotRow = function(idx) {
      const cells = document.querySelectorAll('#progress .seg-cell');
      cells.forEach((c) => {
        const i = parseInt(c.dataset.idx, 10);
        c.classList.remove('is-past', 'is-current');
        if (i < idx) c.classList.add('is-past');
        else if (i === idx) c.classList.add('is-current');
      });
      const items = document.querySelectorAll('#progress li');
      const currentChapter = BEATS[idx] && BEATS[idx].chapter;
      items.forEach(li => {
        li.classList.toggle('is-active', li.dataset.chapter === currentChapter);
      });
    };

    // === SELF-TEST ===
    // Stubs renderNarrative and renderDotRow during test so that
    // advance()/retreat() don't schedule DOM mutations that would
    // visibly flicker the headline on page load.
    (function selfTest() {
      const _origNarrative = renderNarrative;
      const _origDotRow = renderDotRow;
      renderNarrative = function() {};
      renderDotRow = function() {};

      try {
        __assert('BEATS has 18 entries',      BEATS.length === 18);
        __assert('Beat 0 is storyId 1',       BEATS[0].storyId === '1');
        __assert('Beat 2 is storyId 2c',      BEATS[2].storyId === '2c');
        __assert('Beat 3 is storyId 2d',      BEATS[3].storyId === '2d');
        __assert('Beat 4 is capture',         BEATS[4].chapter === 'capture');
        __assert('Beat 6 is storyId 4A',      BEATS[6].storyId === '4A');
        __assert('Beat 7 is storyId 4B',      BEATS[7].storyId === '4B');
        __assert('Beat 17 is closing',        BEATS[17].chapter === 'closing');
        __assert('clamp lo',                  clamp(-5, 0, 17) === 0);
        __assert('clamp hi',                  clamp(99, 0, 17) === 17);

        APP.currentBeat = 0;
        advance(); __assert('advance from 0 -> 1', APP.currentBeat === 1);
        retreat(); __assert('retreat from 1 -> 0', APP.currentBeat === 0);
        retreat(); __assert('retreat from 0 stays 0', APP.currentBeat === 0);
        APP.currentBeat = 17;
        advance(); __assert('advance from 17 stays 17', APP.currentBeat === 17);
        APP.currentBeat = 0;
      } finally {
        renderNarrative = _origNarrative;
        renderDotRow = _origDotRow;
      }
      __reportAssertions();
    })();

    // === INIT ===
    document.addEventListener('DOMContentLoaded', () => {
      buildDotRow();
      setBeat(0);
    });
  </script>
</body>
</html>
