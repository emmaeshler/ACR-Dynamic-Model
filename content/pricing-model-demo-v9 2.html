    CHAPTERS['grid'] = function(beat, prevBeat) {
      ensureGridDom();
      // Remove beat-8 knob→price connector if user retreated from beat 8.
      const _knobConn = document.getElementById('knob-price-connector');
      if (_knobConn && _knobConn.parentNode) _knobConn.parentNode.removeChild(_knobConn);
      // Hide chapter-3 leftover (legend, axes, curve, 4B chrome + twins)
      if (REGION_LEGEND_EL) Tween.run(REGION_LEGEND_EL, { opacity: 0 }, 200);
      if (CURVE_PATH_EL) Tween.run(CURVE_PATH_EL, { opacity: 0 }, 200);
      if (CURVE_LABEL_G) Tween.run(CURVE_LABEL_G, { opacity: 0 }, 200);
      const axes = document.getElementById('axes-c');
      if (axes) Tween.run(axes, { opacity: 0 }, 200);
      // Beat 4B right-panel chrome + twin dots: hide if they were ever built
      if (typeof hideBeat4BChrome === 'function') hideBeat4BChrome(false);
      // Restore legend layout to vertical (in case user returns to beat 4A later)
      if (typeof layoutRegionLegend === 'function') layoutRegionLegend('vertical-C');

      if (beat.storyId === '5') {
        // === CASCADING SCAN: row-by-row, left-to-right ===
        // Hide stats first (will reveal after sweep completes)
        if (GRID_STATS_G) GRID_STATS_G.setAttribute('opacity', '0');

        // Clear beat-6-specific visuals (washes, variance %, orange mini-labels)
        if (GRID_SIGNAL_WASHES) GRID_SIGNAL_WASHES.forEach((w) => Tween.run(w, { 'fill-opacity': 0 }, 200));
        if (GRID_VARIANCE_TEXTS) GRID_VARIANCE_TEXTS.forEach((t) => Tween.run(t, { opacity: 0 }, 200));
        // Reset mini-label fills to default navy
        if (GRID_MINI_LABELS) GRID_MINI_LABELS.forEach((g) => {
          g.setAttribute('fill', 'var(--brand-navy-ink)');
          g.setAttribute('fill-opacity', '0.78');
        });

        // Restore tile rect geometry + badge transforms (in case retreating from beat 7)
        RELEVANT_TILES.forEach((tileIdx) => {
          const t = GRID_TILES[tileIdx];
          const rect = GRID_FRAMES[tileIdx].querySelector('rect');
          rect.setAttribute('x', t.x);
          rect.setAttribute('y', t.y);
          rect.setAttribute('width', t.w);
          rect.setAttribute('height', t.h);
          GRID_BADGES[tileIdx].setAttribute('transform', `translate(${t.x + t.w - 8}, ${t.y + 8})`);
        });
        // All badges hidden in beat 5 (revealed in beat 6)
        GRID_BADGES.forEach((g) => Tween.run(g, { opacity: 0 }, 200));
        // Hide driver-row labels (beat 7 only)
        if (GRID_LABELS)      GRID_LABELS.forEach((g) => Tween.run(g, { opacity: 0 }, 200));
        if (GRID_PRICE_HINTS) GRID_PRICE_HINTS.forEach((g) => Tween.run(g, { opacity: 0 }, 200));
        if (GRID_SIG_ANNO)    Tween.run(GRID_SIG_ANNO, { opacity: 0 }, 200);
        if (GRID_NOISE_ANNO)  Tween.run(GRID_NOISE_ANNO, { opacity: 0 }, 200);

        // Reset stats text in case beats 6/7 changed it
        if (GRID_STATS_TEXT) GRID_STATS_TEXT.textContent = '16 ATTRIBUTES  ·  n = 503';

        // Phase 1 — fly dots into tile positions while dimmed (so they don't
        // streak distractingly across the screen during reposition).
        DOTS.forEach((dot, i) => {
          const p = GRID_DOT_POSITIONS[i];
          dot.setAttribute('r', '2.5');
          const region = REGIONS[DOT_REGION[i]];
          dot.setAttribute('fill', region.color);
          Tween.run(dot, { cx: p.x, cy: p.y, opacity: 0 }, 280);
        });

        // Pre-hide all frames + labels (so the cascade has something to reveal).
        // Use instant attribute set instead of tween so they're hidden
        // immediately, not during a fade.
        GRID_FRAMES.forEach((g) => g.setAttribute('opacity', '0'));
        GRID_MINI_LABELS.forEach((g) => g.setAttribute('opacity', '0'));

        // Phase 2 — after dots arrive, cascade tile frames + labels + dots,
        // tile-by-tile, in row-major order.
        const STEP = 60;  // ms between tile reveals
        const PHASE2_START = 300;
        GRID_TILES.forEach((t, tileIdx) => {
          const delay = PHASE2_START + tileIdx * STEP;
          scheduleBeat(() => {
            if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].storyId !== '5') return;
            Tween.run(GRID_FRAMES[tileIdx], { opacity: 1 }, 320);
            Tween.run(GRID_MINI_LABELS[tileIdx], { opacity: 0.85 }, 320);
            // Fade in dots belonging to this tile
            for (let i = 0; i < DOTS.length; i++) {
              if (DOT_TILE[i] === tileIdx) {
                Tween.run(DOTS[i], { opacity: 0.85 }, 360);
              }
            }
          }, delay);
        });

        // Stats header reveals at the end of the sweep
        scheduleBeat(() => {
          if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].storyId === '5') {
            Tween.run(GRID_STATS_G, { opacity: 1 }, 400);
          }
        }, PHASE2_START + 16 * STEP + 80);
      } else if (beat.storyId === '6') {
        if (GRID_STATS_G) Tween.run(GRID_STATS_G, { opacity: 1 }, 300);
        if (GRID_STATS_TEXT) GRID_STATS_TEXT.textContent = '4 SIGNIFICANT  ·  12 NOISE';
        // Restore SIG chip text (if user retreated from beat 7 where it became X%)
        RELEVANT_TILES.forEach((tileIdx) => {
          const badge = GRID_BADGES[tileIdx];
          if (!badge) return;
          const texts = badge.querySelectorAll('text');
          if (texts[0]) texts[0].textContent = 'SIG';
          if (texts[1]) texts[1].setAttribute('opacity', '1');
        });
        // Restore tile rect geometry + badge transforms (in case retreating from beat 7)
        RELEVANT_TILES.forEach((tileIdx) => {
          const t = GRID_TILES[tileIdx];
          const rect = GRID_FRAMES[tileIdx].querySelector('rect');
          Tween.run(rect, { x: t.x, y: t.y, width: t.w, height: t.h }, 600);
          GRID_BADGES[tileIdx].setAttribute('transform', `translate(${t.x + t.w - 8}, ${t.y + 8})`);
        });
        // Hide driver labels + price hints (beat 7 chrome)
        if (GRID_LABELS) GRID_LABELS.forEach((g) => Tween.run(g, { opacity: 0 }, 200));
        if (GRID_PRICE_HINTS) GRID_PRICE_HINTS.forEach((g) => Tween.run(g, { opacity: 0 }, 200));
        // Hide italic "clear pattern" / "noise" annotations (replaced by chip + variance text)
        if (GRID_SIG_ANNO) Tween.run(GRID_SIG_ANNO, { opacity: 0 }, 200);
        if (GRID_NOISE_ANNO) Tween.run(GRID_NOISE_ANNO, { opacity: 0 }, 200);
        // Restore relevant dots to GRID_DOT_POSITIONS (they were moved to DRIVERS_ROW_POSITIONS in beat 7)
        DOTS.forEach((dot, i) => {
          if (TILE_IS_RELEVANT(DOT_TILE[i])) {
            const p = GRID_DOT_POSITIONS[i];
            Tween.run(dot, { cx: p.x, cy: p.y }, 600);
          }
        });
        // Ensure all 16 frames + mini-labels start visible (in case retreat from beat 7)
        GRID_FRAMES.forEach((g) => Tween.run(g, { opacity: 1 }, 200));
        GRID_MINI_LABELS.forEach((g, i) => {
          const t = GRID_TILES[i];
          g.setAttribute('x', t.x + t.w / 2);
          g.setAttribute('y', t.y - 6);
          Tween.run(g, { opacity: 0.85 }, 200);
          // Reset fill in case beat 6 left it orange
          g.setAttribute('fill', 'var(--brand-navy-ink)');
          g.setAttribute('fill-opacity', '0.78');
        });

        // === Phase 1: CASCADING DIM-OUT of 12 noise tiles ===
        // Each noise tile fades 50ms after the previous. Total ~600ms.
        let dimDelay = 0;
        for (let i = 0; i < 16; i++) {
          if (!TILE_IS_RELEVANT(i)) {
            const localDelay = dimDelay;
            scheduleBeat(() => {
              if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].storyId !== '6') return;
              // Dim tile frame + label
              Tween.run(GRID_FRAMES[i], { opacity: 0.28 }, 400);
              Tween.run(GRID_MINI_LABELS[i], { opacity: 0.32 }, 400);
              // Show n.s. badge
              Tween.run(GRID_BADGES[i], { opacity: 1 }, 400);
              // Dim noise tile dots
              for (let j = 0; j < DOTS.length; j++) {
                if (DOT_TILE[j] === i) {
                  Tween.run(DOTS[j], { opacity: 0.10 }, 400);
                }
              }
            }, localDelay);
            dimDelay += 55;
          }
        }

        // === Phase 2: SIGNAL POP on the 4 relevant tiles ===
        // After the noise fades, each signal tile lights up — orange wash,
        // SIG chip + p<.01 caption fade in, mini-label turns orange, dots brighten,
        // variance % fades in below the tile. 100ms stagger between the four.
        const signalStart = dimDelay + 150;
        RELEVANT_TILES.forEach((tileIdx, i) => {
          scheduleBeat(() => {
            if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].storyId !== '6') return;
            // Orange wash behind signal tile
            if (GRID_SIGNAL_WASHES && GRID_SIGNAL_WASHES[i]) {
              Tween.run(GRID_SIGNAL_WASHES[i], { 'fill-opacity': 0.18 }, 500);
            }
            // SIG chip badge
            Tween.run(GRID_BADGES[tileIdx], { opacity: 1 }, 450);
            // Mini-label turns orange + full opacity (non-tween fill swap)
            GRID_MINI_LABELS[tileIdx].setAttribute('fill', 'var(--brand-orange)');
            GRID_MINI_LABELS[tileIdx].setAttribute('fill-opacity', '1');
            Tween.run(GRID_MINI_LABELS[tileIdx], { opacity: 1 }, 450);
            // Brighten signal tile dots
            for (let j = 0; j < DOTS.length; j++) {
              if (DOT_TILE[j] === tileIdx) {
                Tween.run(DOTS[j], { opacity: 0.95 }, 450);
              }
            }
            // V7: variance % captions removed per feedback.
          }, signalStart + i * 110);
        });
      } else if (beat.storyId === '7') {
        if (GRID_STATS_G) Tween.run(GRID_STATS_G, { opacity: 1 }, 300);
        if (GRID_STATS_TEXT) GRID_STATS_TEXT.textContent = '4 DRIVERS  ·  92% OF VARIANCE';
        // Hide beat-6 specific visuals (washes + variance captions) — beat 7
        // has its own emphasis (the driver row).
        if (GRID_SIGNAL_WASHES) GRID_SIGNAL_WASHES.forEach((w) => Tween.run(w, { 'fill-opacity': 0 }, 300));
        if (GRID_VARIANCE_TEXTS) GRID_VARIANCE_TEXTS.forEach((t) => Tween.run(t, { opacity: 0 }, 300));
        // Reset mini-label fills (we hid them in beat 7 below anyway, but be defensive)
        if (GRID_MINI_LABELS) GRID_MINI_LABELS.forEach((g) => {
          g.setAttribute('fill', 'var(--brand-navy-ink)');
          g.setAttribute('fill-opacity', '0.78');
        });

        // Swap SIG chip text → per-driver variance % (only on the 4 relevant tile badges).
        // We mutate the inner <text> nodes of each relevant badge.
        const VARIANCE_VALUES = [64, 18, 7, 3];
        RELEVANT_TILES.forEach((tileIdx, i) => {
          const badge = GRID_BADGES[tileIdx];
          if (!badge) return;
          const texts = badge.querySelectorAll('text');
          // texts[0] = chip text (was "SIG"), texts[1] = "p < .01"
          if (texts[0]) texts[0].textContent = VARIANCE_VALUES[i] + '%';
          if (texts[1]) texts[1].setAttribute('opacity', '0'); // hide p<.01
        });

        // Hide irrelevant tiles entirely; move relevant tiles + their dots into a horizontal row.
        GRID_FRAMES.forEach((g, i) => {
          Tween.run(g, { opacity: TILE_IS_RELEVANT(i) ? 1 : 0 }, 400);
        });
        GRID_BADGES.forEach((g, i) => {
          Tween.run(g, { opacity: TILE_IS_RELEVANT(i) ? 1 : 0 }, 300);
        });
        // Move relevant tile frames to driver-row positions
        RELEVANT_TILES.forEach((tileIdx, i) => {
          const t = DRIVERS_ROW_TILES[i];
          const rect = GRID_FRAMES[tileIdx].querySelector('rect');
          // Tween rect x/y/width/height
          Tween.run(rect, { x: t.x, y: t.y, width: t.w, height: t.h }, 800);
          // Move badge
          Tween.run(GRID_BADGES[tileIdx], { opacity: 1 }, 200);
          GRID_BADGES[tileIdx].setAttribute('transform', `translate(${t.x + t.w - 8}, ${t.y + 8})`);
        });
        // Move dots in relevant tiles to their driver-row positions; hide irrelevant dots
        DOTS.forEach((dot, i) => {
          const inRelevant = TILE_IS_RELEVANT(DOT_TILE[i]);
          if (inRelevant) {
            const p = DRIVERS_ROW_POSITIONS[i];
            Tween.run(dot, { cx: p.x, cy: p.y, opacity: 0.95 }, 800);
          } else {
            Tween.run(dot, { opacity: 0 }, 400);
          }
        });
        // Hide the 16 mini-labels (beat 7 uses its own driver-row labels)
        if (GRID_MINI_LABELS) {
          GRID_MINI_LABELS.forEach((g) => Tween.run(g, { opacity: 0 }, 300));
        }
        // Hide signal/noise annotations (beat 6 only)
        if (GRID_SIG_ANNO) Tween.run(GRID_SIG_ANNO, { opacity: 0 }, 300);
        if (GRID_NOISE_ANNO) Tween.run(GRID_NOISE_ANNO, { opacity: 0 }, 300);
        // Show driver-name labels + lighter "(Price)" hint
        GRID_LABELS.forEach((g, i) => {
          scheduleBeat(() => Tween.run(g, { opacity: 1 }, 400), 200 + i * 80);
        });
        if (GRID_PRICE_HINTS) {
          GRID_PRICE_HINTS.forEach((g, i) => {
            scheduleBeat(() => Tween.run(g, { opacity: 0.85 }, 400), 280 + i * 80);
          });
        }
      }
    };

    // === KNOB PRIMITIVE ===
    // Each knob is a <g> at (cx, cy) of radius r. Indicator rotates via transform.
    // value: optional string shown BIG below the knob (e.g. "+12%"). When supplied,
    //        the small label below the value reads in mono caps as a subtitle.
    function makeKnob({ cx, cy, r, label, value }) {
      const g = svg('g', { 'data-knob': '1', opacity: 0,
        transform: `translate(${cx}, ${cy})` });
      // Outer ring
      g.appendChild(svg('circle', { cx: 0, cy: 0, r,
        fill: 'var(--brand-surface)', stroke: 'var(--brand-navy)', 'stroke-width': 2 }));
      // Inner face
      g.appendChild(svg('circle', { cx: 0, cy: 0, r: r * 0.78,
        fill: 'var(--brand-light-blue)' }));
      // Indicator — slightly shorter so it doesn't reach the center (cleaner with bigger knob)
      const ind = svg('line', {
        x1: 0, y1: -r * 0.18, x2: 0, y2: -r * 0.62,
        stroke: 'var(--brand-orange)', 'stroke-width': r > 35 ? 3.5 : 3, 'stroke-linecap': 'round',
        'data-rcx': '0', 'data-rcy': '0',
      });
      // Center dot for spindle feel
      g.appendChild(svg('circle', { cx: 0, cy: 0, r: r * 0.10,
        fill: 'var(--brand-navy)' }));
      // Wrap the indicator in its own <g> so we can rotate independently
      const indWrap = svg('g', { transform: 'rotate(0)', 'data-ind': '1' });
      indWrap.appendChild(ind);
      g.appendChild(indWrap);
      // Tick marks (8 around the rim)
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2;
        const x1 = Math.cos(ang) * (r * 0.92);
        const y1 = Math.sin(ang) * (r * 0.92);
        const x2 = Math.cos(ang) * (r * 1.02);
        const y2 = Math.sin(ang) * (r * 1.02);
        g.appendChild(svg('line', { x1, y1, x2, y2, stroke: 'var(--brand-navy)', 'stroke-width': 1.2, opacity: 0.5 }));
      }
      // Big value text (e.g. "+12%") — primary callout below the knob
      let valueText = null;
      if (value) {
        valueText = svg('text', { x: 0, y: r + 26, 'text-anchor': 'middle',
          'font-size': 18, 'font-weight': 700, fill: 'var(--brand-navy-ink)',
          'letter-spacing': '-0.01em',
          'data-role': 'knob-value' });
        valueText.textContent = value;
        g.appendChild(valueText);
      }
      // Driver-name label (small mono caps below value, or directly below knob if no value)
      if (label) {
        const t = svg('text', { x: 0, y: r + (value ? 46 : 22), 'text-anchor': 'middle',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 10, 'letter-spacing': '0.16em', 'font-weight': 600,
          fill: 'var(--brand-text-muted)',
          'data-role': 'knob-label' });
        t.textContent = label.toUpperCase();
        g.appendChild(t);
      }
      return { g, indWrap, valueText, baseTransform: { cx, cy } };
    }

    function rotateKnob(knob, deg, duration = 600) {
      // We tween a custom 'rotateInd' attribute on the indWrap by manipulating its transform.
      const cur = (knob.indWrap.getAttribute('transform') || 'rotate(0)').match(/rotate\(([-\d.]+)/);
      const from = cur ? parseFloat(cur[1]) : 0;
      const t0 = performance.now();
      const reduce = Tween.reduce;
      // v8: snap mode (backward / jump) — jump to final rotation, no RAF.
      if (reduce || APP.snapMode) {
        knob.indWrap.setAttribute('transform', `rotate(${deg})`);
        return;
      }
      function tick(now) {
        const t = Math.min(1, (now - t0) / duration);
        const e = Tween.ease(t);
        const v = from + (deg - from) * e;
        knob.indWrap.setAttribute('transform', `rotate(${v})`);
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // 16 knob pool (created in chapter 5, persists through chapter 7)
    const KNOBS = [];
    let KNOBS16_BOUNDS = null;    // {centerX, bottomY} set when ensureKnobs16 builds the 4×4 grid
    let SMALL_CURVE_R = null;     // small curve drawn into Slot R for chapter 5
    let SMALL_CURVE_PATH = null;
    let SMALL_CURVE_DOT = null;

    // Y position of the 4-knob row for beat 8.
    // Aligned to the small curve's vertical midline (matches the curve dot's
    // ~t=0.35 landing zone in Slot R, so the dashed connector reads as a short arc).
    const KNOBS4_ROW_Y = 380;
    const KNOBS4_VALUES = ['+12%', '+8%', '−5%', '+15%'];  // Region, Channel, Order Size, Customer Tier

    function ensureKnobs4() {
      if (KNOBS.length > 0) return;
      // V7: smaller knobs + tighter gap so the row clears the slot-R chart.
      const cy = KNOBS4_ROW_Y;
      const r = 42;
      const gap = 14;
      const totalW = 4 * (r * 2) + gap * 3;
      // Shift LEFT of center so the rightmost knob doesn't crowd the chart's
      // y-axis label (sits just inside slot R).
      const startX = STAGE.L.x + (STAGE.L.w - totalW) / 2 + r - 8;
      for (let i = 0; i < 4; i++) {
        const cx = startX + i * (r * 2 + gap);
        const k = makeKnob({ cx, cy, r, label: DRIVER_NAMES[i], value: KNOBS4_VALUES[i] });
        LAYERS.knobs.appendChild(k.g);
        KNOBS.push(k);
      }
    }

    function ensureSmallCurveR() {
      if (SMALL_CURVE_R) return;
      SMALL_CURVE_R = makeCurve(STAGE.R);

      // Data-dense axes for Slot R — same scale as beats 1/2 for continuity.
      const axesR = buildAxes(STAGE.R, {

        xTitle:  'QUANTITY (UNITS)',
        yTitle:  'PRICE ($)',
        showGrid: true,
      });
      axesR.id = 'axes-r-small';
      axesR.setAttribute('opacity', '0');
      LAYERS.axes.appendChild(axesR);

      SMALL_CURVE_PATH = svg('path', {
        d: SMALL_CURVE_R.d,
        fill: 'none', stroke: 'var(--brand-navy)', 'stroke-width': 2.5, opacity: 0,
        'stroke-linecap': 'round',
      });
      LAYERS.curve.appendChild(SMALL_CURVE_PATH);
      const p = SMALL_CURVE_R.sampleAt(0.5);
      SMALL_CURVE_DOT = svg('circle', { cx: p.x, cy: p.y, r: 8, fill: 'var(--brand-orange)', opacity: 0 });
      LAYERS.dots.appendChild(SMALL_CURVE_DOT);

      // Annotated curve label — matches beats 1/2's "THE TARGET / Optimal pricing curve"
      // pattern with mono eyebrow + bold navy label + leader to the curve.
      const anchorR = SMALL_CURVE_R.sampleAt(0.65);
      const lblX = anchorR.x + 30;
      const lblY = anchorR.y - 38;
      const curveLabelR = svg('g', { id: 'curve-label-r-g', opacity: 0 });
      curveLabelR.appendChild(svg('line', {
        x1: anchorR.x, y1: anchorR.y,
        x2: lblX - 6, y2: lblY + 6,
        stroke: 'var(--brand-navy)', 'stroke-width': 1, 'stroke-opacity': 0.5,
      }));
      curveLabelR.appendChild(svg('circle', {
        cx: anchorR.x, cy: anchorR.y, r: 3, fill: 'var(--brand-navy)', 'fill-opacity': 0.7,
      }));
      const eyR = svg('text', {
        x: lblX, y: lblY - 4,
        'text-anchor': 'start',

      eyR.textContent = 'THE TARGET';

      const lblTextR = svg('text', {
        x: lblX, y: lblY + 14,

        'letter-spacing': '-0.01em',
      });
      lblTextR.textContent = 'Optimal pricing curve';
      curveLabelR.appendChild(lblTextR);
      LAYERS.labels.appendChild(curveLabelR);

      // Stat callout near the curve dot — small mono-caps "deal value" badge.
      const dotStat = svg('g', { id: 'small-curve-dot-stat', opacity: 0 });
      const dotStatLabel = svg('text', {
        x: p.x + 14, y: p.y - 4,
        'text-anchor': 'start',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 9.5, 'letter-spacing': '0.14em',
        'font-weight': 600, fill: 'var(--brand-text-muted)',

      });

      const dotStatNum = svg('text', {

        'font-size': 13, 'font-weight': 700, fill: 'var(--brand-navy-ink)',

      });
      dotStatNum.textContent = '~$172 · 1.5k units';
      dotStat.appendChild(dotStatLabel);
      dotStat.appendChild(dotStatNum);
      LAYERS.labels.appendChild(dotStat);
    }

    // === CHAPTER 5 — drivers become knobs ===
    CHAPTERS['knobs-few'] = function(beat, prevBeat) {
      ensureKnobs4();
      ensureSmallCurveR();

      // Reset all knob value texts to their original starting values on each entry
      KNOBS.slice(0, 4).forEach((k, i) => {
        const valEl = k.g.querySelector('[data-role="knob-value"]');
        if (valEl) valEl.textContent = KNOBS4_VALUES[i];
      });
      // Reset the indicators to 0° so the demo rotation reads cleanly
      KNOBS.slice(0, 4).forEach((k) => {
        if (k.indWrap) k.indWrap.setAttribute('transform', 'rotate(0)');
      });
      // Reset the curve dot position + stat text on each entry
      if (SMALL_CURVE_R && SMALL_CURVE_DOT) {
        const p0 = SMALL_CURVE_R.sampleAt(0.5);
        SMALL_CURVE_DOT.setAttribute('cx', p0.x);
        SMALL_CURVE_DOT.setAttribute('cy', p0.y);
      }
      const _dotStatReset = document.getElementById('small-curve-dot-stat');
      if (_dotStatReset && SMALL_CURVE_R) {
        const p0 = SMALL_CURVE_R.sampleAt(0.5);
        const eyebrow = _dotStatReset.querySelector('[data-role="dot-stat-eyebrow"]');
        const num = _dotStatReset.querySelector('[data-role="dot-stat-num"]');
        if (eyebrow) { eyebrow.setAttribute('x', p0.x + 14); eyebrow.setAttribute('y', p0.y - 4); }
        if (num) { num.setAttribute('x', p0.x + 14); num.setAttribute('y', p0.y + 12); num.textContent = '~$172 · 1.5k units'; }
      }

      // Remove beat-9 math caption on retreat (mirrors the connector cleanup pattern from T12).
      const _caption = document.getElementById('knobs-math-caption');
      if (_caption) {
        Tween.run(_caption, { opacity: 0 }, 300);
        scheduleBeat(() => { if (_caption.parentNode) _caption.parentNode.removeChild(_caption); }, 350);
      }

      // Reverse beat 9 → beat 8: hide any extra knobs (above index 3); move original 4 back to row.
      for (let i = 4; i < KNOBS.length; i++) {
        Tween.run(KNOBS[i].g, { opacity: 0 }, 300);
      }
      const cy = KNOBS4_ROW_Y;
      // V7: must match ensureKnobs4()'s layout (smaller + shifted left).
      const r4 = 42;
      const gap4 = 14;
      const totalW4 = 4 * (r4 * 2) + gap4 * 3;
      const startX4 = STAGE.L.x + (STAGE.L.w - totalW4) / 2 + r4 - 8;
      KNOBS.slice(0, 4).forEach((k, i) => {
        const cx = startX4 + i * (r4 * 2 + gap4);
        const cur = (k.g.getAttribute('transform') || '').match(/translate\(([-\d.]+),\s*([-\d.]+)\)/);
        const fromX = cur ? parseFloat(cur[1]) : 0;
        const fromY = cur ? parseFloat(cur[2]) : 0;
        const t0 = performance.now(); const dur = 700;
        if (Tween.reduce || APP.snapMode) {
          k.g.setAttribute('transform', `translate(${cx}, ${cy})`);
        } else {
          (function tick(now) {
            const tt = Math.min(1, (now - t0) / dur);
            const e = Tween.ease(tt);
            const x = fromX + (cx - fromX) * e;
            const y = fromY + (cy - fromY) * e;
            k.g.setAttribute('transform', `translate(${x}, ${y})`);
            if (tt < 1) requestAnimationFrame(tick);
          })(performance.now());
        }
        // Re-show ALL text children (value + label)
        k.g.querySelectorAll('text').forEach(t => Tween.run(t, { opacity: 1 }, 400));
      });

      // Hide chapter-4 grid/labels and the dots that were on them
      if (GRID_FRAMES) GRID_FRAMES.forEach((g) => Tween.run(g, { opacity: 0 }, 400));
      if (GRID_BADGES) GRID_BADGES.forEach((g) => Tween.run(g, { opacity: 0 }, 400));
      if (GRID_LABELS) GRID_LABELS.forEach((g) => Tween.run(g, { opacity: 0 }, 400));
      if (GRID_PRICE_HINTS) GRID_PRICE_HINTS.forEach((g) => Tween.run(g, { opacity: 0 }, 400));
      if (GRID_MINI_LABELS) GRID_MINI_LABELS.forEach((g) => Tween.run(g, { opacity: 0 }, 400));
      if (GRID_SIG_ANNO) Tween.run(GRID_SIG_ANNO, { opacity: 0 }, 400);
      if (GRID_NOISE_ANNO) Tween.run(GRID_NOISE_ANNO, { opacity: 0 }, 400);
      DOTS.forEach((dot) => Tween.run(dot, { opacity: 0 }, 400));

      // Show 4 knobs (staggered)
      KNOBS.forEach((k, i) => {
        scheduleBeat(() => Tween.run(k.g, { opacity: 1 }, 500), i * 100);
      });

      // Show small curve in Slot R with dot + axes
      const axesR = document.getElementById('axes-r-small');
      if (axesR) Tween.run(axesR, { opacity: 1 }, 500);
      Tween.run(SMALL_CURVE_PATH, { opacity: 1 }, 500);
      Tween.run(SMALL_CURVE_DOT, { opacity: 1 }, 500);
      const curveLblG = document.getElementById('curve-label-r-g');
      if (curveLblG) Tween.run(curveLblG, { opacity: 1 }, 500);
      const dotStat = document.getElementById('small-curve-dot-stat');
      if (dotStat) Tween.run(dotStat, { opacity: 1 }, 500);

      // === Synced cause-effect demo ===
      // 1. Knob rotates (300ms)
      // 2. Connector draws from knob to curve (300ms, starting at +200ms)
      // 3. Dot animates along curve (700ms, starting at +500ms from knob start)
      // 4. Knob's value text updates partway through the move
      scheduleBeat(() => {
        // Phase 1 — knob 1 (Channel) rotates 40°
        rotateKnob(KNOBS[1], 40, 800);

        // Phase 2 — draw connector after a brief delay
        scheduleBeat(() => {
          // Remove any prior connector
          const prior = document.getElementById('knob-price-connector');
          if (prior) prior.remove();
          const fromKnob = KNOBS[3];  // Customer Tier — rightmost
          const m = (fromKnob.g.getAttribute('transform') || '').match(/translate\(([-\d.]+),\s*([-\d.]+)\)/);
          const kx = m ? parseFloat(m[1]) : 467.5;
          const ky = m ? parseFloat(m[2]) : KNOBS4_ROW_Y;
          const target = SMALL_CURVE_R.sampleAt(0.35);
          const startX = kx + 48;  // outside knob radius (r=42, +6 breathing room)
          const startY = ky;
          const endX = target.x - 12;
          const endY = target.y;
          const ctrlX = (startX + endX) / 2;
          const ctrlY = Math.min(startY, endY) - 50;
          const connector = svg('path', {
            d: `M ${startX} ${startY} Q ${ctrlX} ${ctrlY} ${endX} ${endY}`,
            fill: 'none',
            stroke: 'var(--brand-orange)',
            'stroke-width': 1.5,
            'stroke-dasharray': '4 4',
            opacity: 0,
            id: 'knob-price-connector',
            'pointer-events': 'none',
          });
          LAYERS.knobs.appendChild(connector);
          Tween.run(connector, { opacity: 0.8 }, 400);
        }, 200);

        // Phase 3 — dot animates to new position + knob value flips, after connector starts
        scheduleBeat(() => {
          const target = SMALL_CURVE_R.sampleAt(0.35);
          Tween.run(SMALL_CURVE_DOT, { cx: target.x, cy: target.y }, 700);
          // Move the dot-stat callout along with the dot
          if (dotStat) {
            const eyebrow = dotStat.querySelector('[data-role="dot-stat-eyebrow"]');
            const num = dotStat.querySelector('[data-role="dot-stat-num"]');
            if (eyebrow) Tween.run(eyebrow, { x: target.x + 14, y: target.y - 4 }, 700);
            if (num) Tween.run(num, { x: target.x + 14, y: target.y + 12 }, 700);
            // Update the price number mid-flight (at +350ms)
            scheduleBeat(() => {
              if (num) num.textContent = '~$148 · 3.5k units';
            }, 350);
          }
          // Update the rotated knob's value text mid-flight
          const knob1Val = KNOBS[1].g.querySelector('[data-role="knob-value"]');
          if (knob1Val) {
            scheduleBeat(() => { knob1Val.textContent = '+14%'; }, 350);
          }
        }, 500);
      }, 900);
    };

    // === CHAPTER 6 — 16 knobs ===
    // Grow the 4 knobs into a 4×4 grid. The original 4 stay; 12 new knobs are added.

    function ensureKnobs16() {
      if (KNOBS.length >= 16) return;
      // 4×4 grid layout in Slot L — vertically centered on STAGE.H / 2.
      const cols = 4, rows = 4;
      const slot = STAGE.L;
      const padX = 18, padY = 18;
      const knobR = 24;
      const cellW = (slot.w - padX * (cols + 1)) / cols;
      const cellH = (slot.h - padY * (rows + 1)) / rows;
      // Vertically center the grid: midpoint of all row centers sits at STAGE.H / 2.
      // Row spacing is (cellH + padY); span from row 0 → row (rows-1) is (rows-1)*spacing.
      const rowSpacing = cellH + padY;
      const gridMidY = STAGE.H / 2;
      const firstRowCy = gridMidY - ((rows - 1) * rowSpacing) / 2;
      // Build target positions for all 16 cells
      const targets = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          targets.push({
            cx: slot.x + padX + c * (cellW + padX) + cellW / 2,
            cy: firstRowCy + r * rowSpacing,
            r: knobR,
          });
        }
      }
      // Stash the grid bounds so CHAPTERS['knobs-many'] can place the caption.
      KNOBS16_BOUNDS = {
        centerX: slot.x + slot.w / 2,
        bottomY: firstRowCy + (rows - 1) * rowSpacing + knobR,
      };
      // The existing 4 knobs go to the diagonal (0, 5, 10, 15) for continuity
      const existingTargets = [0, 5, 10, 15];
      KNOBS.forEach((k, i) => {
        const t = targets[existingTargets[i]];
        // Tween the group's transform (translate) — we re-emit transform attribute manually
        const startTransform = k.g.getAttribute('transform') || `translate(0, 0)`;
        const m = startTransform.match(/translate\(([-\d.]+),\s*([-\d.]+)\)/);
        const fromX = m ? parseFloat(m[1]) : 0;
        const fromY = m ? parseFloat(m[2]) : 0;
        const dur = 700;
        const t0 = performance.now();
        const reduce = Tween.reduce;
        if (reduce || APP.snapMode) {
          k.g.setAttribute('transform', `translate(${t.cx}, ${t.cy})`);
        } else {
          (function tick(now) {
            const tt = Math.min(1, (now - t0) / dur);
            const e = Tween.ease(tt);
            const x = fromX + (t.cx - fromX) * e;
            const y = fromY + (t.cy - fromY) * e;
            k.g.setAttribute('transform', `translate(${x}, ${y})`);
            if (tt < 1) requestAnimationFrame(tick);
          })(performance.now());
        }
        // Hide BOTH the value text and the driver-name label — the 4×4 matrix uses
        // its own row/column headers, so per-knob captions become redundant clutter.
        k.g.querySelectorAll('text').forEach(tx => Tween.run(tx, { opacity: 0 }, 200));
      });
      // Add the 12 new knobs at their target positions, invisible at first
      for (let i = 0; i < 16; i++) {
        if (existingTargets.includes(i)) continue;
        const t = targets[i];
        const k = makeKnob({ cx: t.cx, cy: t.cy, r: t.r, label: null });
        LAYERS.knobs.appendChild(k.g);
        KNOBS.push(k);
      }
    }

    // Beat-9 chrome: matrix labels (row + column headers), highlight cell, extra curve dots.
    let KNOBS16_MATRIX_LABELS = null;     // { topLabels: [text]×4, leftLabels: [text]×4 }
    let KNOBS16_HIGHLIGHT_G = null;       // <g> wrapping the orange halo + "+9%" chip
    let KNOBS_MANY_CURVE_DOTS = null;     // [circle]×4 — extra dots scattered on slot R curve

    function ensureKnobs16Chrome() {
      if (KNOBS16_MATRIX_LABELS) return;
      // Ensure SMALL_CURVE_R exists (used for extra curve dots) — chapter 5 normally
      // builds it, but if the user jumped directly to beat 9 we need to build it.
      ensureSmallCurveR();
      // Matrix labels — top row + left column, mono caps, muted.
      KNOBS16_MATRIX_LABELS = { topLabels: [], leftLabels: [] };
      // Replay the grid geometry to position labels precisely.
      const slot = STAGE.L;
      const padX = 18, padY = 18;
      const cols = 4, rows = 4;
      const cellW = (slot.w - padX * (cols + 1)) / cols;
      const cellH = (slot.h - padY * (rows + 1)) / rows;
      const rowSpacing = cellH + padY;
      const gridMidY = STAGE.H / 2;
      const firstRowCy = gridMidY - ((rows - 1) * rowSpacing) / 2;
      const knobR = 24;
      // Top labels (column headers).
      // Anchor based on the DIAGONAL knob radius (50, not the smaller off-diagonal 24)
      // so they clear the bigger originals at row 0.
      for (let c = 0; c < cols; c++) {
        const cx = slot.x + padX + c * (cellW + padX) + cellW / 2;
        const lbl = svg('text', {
          x: cx, y: firstRowCy - 50 - 14,
          'text-anchor': 'middle',

          'font-size': 9.5, 'letter-spacing': '0.14em',
          'font-weight': 600, fill: 'var(--brand-text-muted)',
          'data-role': 'matrix-top',
          opacity: 0,
        });
        lbl.textContent = DRIVER_NAMES[c].toUpperCase();
        LAYERS.knobs.appendChild(lbl);
        KNOBS16_MATRIX_LABELS.topLabels.push(lbl);
      }
      // Left labels (row headers, right-aligned just left of the grid).
      // Short abbreviations so they fit within the left margin of slot L.
      const ROW_HEADER_LABELS = ['REGION', 'CHANNEL', 'ORDER', 'TIER'];
      for (let r = 0; r < rows; r++) {
        const cy = firstRowCy + r * rowSpacing;
        const lbl = svg('text', {
          x: slot.x + padX - knobR - 2, y: cy + 3,

        lbl.textContent = ROW_HEADER_LABELS[r];
        LAYERS.knobs.appendChild(lbl);
        KNOBS16_MATRIX_LABELS.leftLabels.push(lbl);
      }
      // Highlight: Region × Order Size = cell (row 0, col 2) = index 2.
      // Orange halo ring around the cell + "+9%" chip BELOW it (the column header
      // sits above the cell, so we put the chip below to avoid collision).
      const cellIdx = 2;
      const cellCx = slot.x + padX + 2 * (cellW + padX) + cellW / 2;  // col 2
      const cellCy = firstRowCy;  // row 0
      KNOBS16_HIGHLIGHT_G = svg('g', { id: 'knobs16-highlight', opacity: 0 });
      // Halo ring outside the knob
      KNOBS16_HIGHLIGHT_G.appendChild(svg('circle', {
        cx: cellCx, cy: cellCy, r: knobR + 6,
        fill: 'none', stroke: 'var(--brand-orange)',
        'stroke-width': 1.5, 'stroke-opacity': 0.85,
        'stroke-dasharray': '3 3',
      }));
      // Chip floating BELOW the cell, between row 0 and row 1
      const chipY = cellCy + knobR + 18;  // text baseline below the knob
      KNOBS16_HIGHLIGHT_G.appendChild(svg('rect', {
        x: cellCx - 22, y: chipY - 11, width: 44, height: 16,
        rx: 2.5, ry: 2.5, fill: 'var(--brand-orange)',
      }));
      const chipTxt = svg('text', {
        x: cellCx, y: chipY,
        'text-anchor': 'middle',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 10, 'letter-spacing': '0.10em',
        'font-weight': 700, fill: '#fff',
      });
      chipTxt.textContent = '+9%';
      KNOBS16_HIGHLIGHT_G.appendChild(chipTxt);
      LAYERS.knobs.appendChild(KNOBS16_HIGHLIGHT_G);

      // Extra dots on Slot R curve for "more knobs → more prices captured"
      KNOBS_MANY_CURVE_DOTS = [];
      const extraT = [0.15, 0.30, 0.55, 0.75];
      extraT.forEach((t) => {
        const p = SMALL_CURVE_R.sampleAt(t);
        const d = svg('circle', {
          cx: p.x, cy: p.y, r: 6,
          fill: 'var(--brand-orange)',
          opacity: 0,
        });
        LAYERS.dots.appendChild(d);
        KNOBS_MANY_CURVE_DOTS.push(d);
      });
    }

    CHAPTERS['knobs-many'] = function(beat, prevBeat) {
      ensureKnobs4();          // ensures the 4 base knobs (in case user jumped here)
      ensureKnobs16();
      ensureSmallCurveR();     // ensures slot R curve exists (used by extra dots)
      ensureKnobs16Chrome();

      const _axesRJump = document.getElementById('axes-r-small');

      if (SMALL_CURVE_DOT)  Tween.run(SMALL_CURVE_DOT, { opacity: 1 }, 400);
      const _curveLblJump = document.getElementById('curve-label-r-g');
      if (_curveLblJump) Tween.run(_curveLblJump, { opacity: 1 }, 400);

      // shrink transform applied — reset so the 4×4 grid renders at native scale.
      LAYERS.knobs.setAttribute('transform', '');
