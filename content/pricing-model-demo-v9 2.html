    // === Beat 2d (v7): full area under curve shaded orange ===
    // The ML "any number of prices" story — every point on the curve gets its
    // own price, so the captured area IS the entire region under the curve.
    function ensureBeat2dFill() {
      if (BEAT2D_FILL_PATH) return;
      const curve = ensureCurveC();
      const baselineY = STAGE.C.y + STAGE.C.h;
      const slotLeftX = STAGE.C.x;
      const slotRightX = STAGE.C.x + STAGE.C.w;
      // Sample the curve at fine resolution, then close to the baseline.
      const samples = 64;
      const parts = [];
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const p = curve.sampleAt(t);
        parts.push(`${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`);
      }
      parts.push(`L ${slotRightX} ${baselineY}`);
      parts.push(`L ${slotLeftX} ${baselineY}`);
      parts.push('Z');
      BEAT2D_FILL_PATH = svg('path', {
        d: parts.join(' '),
        fill: 'rgba(234, 106, 10, 0.22)',
        stroke: 'rgba(234, 106, 10, 0.55)',
        'stroke-width': 1,
        opacity: 0,
      });
      // Insert BEFORE the curve so the curve renders on top
      LAYERS.curve.insertBefore(BEAT2D_FILL_PATH, CURVE_PATH_EL);
    }

    // === CHAPTER 1 — optimal curve ===
    CHAPTERS['optimal-curve'] = function(beat, prevBeat) {
      const curve = ensureCurveC();
      ensureBeat1Annotations();
      ensureBeat1Fill();
      ensureBeat2Fill();
      ensureBeat2cGap();
      ensureBeat2dFill();

      // V7: reset any morph transforms applied by the 4→5 slide so the slot-C
      // chart renders at its native position.
      if (CURVE_PATH_EL) CURVE_PATH_EL.removeAttribute('transform');
      if (BEAT2D_FILL_PATH) BEAT2D_FILL_PATH.removeAttribute('transform');

      // Show axes
      const axes = document.getElementById('axes-c');
      Tween.run(axes, { opacity: 1 }, 400);

      // Stroke-draw the curve in. If already drawn, just hold visible.
      const currentOff = parseFloat(CURVE_PATH_EL.getAttribute('stroke-dashoffset') || '0');
      const currentOp = parseFloat(CURVE_PATH_EL.getAttribute('opacity') || '0');
      if (currentOp < 0.99 || currentOff > 1) {
        CURVE_PATH_EL.setAttribute('opacity', '1');
        Tween.run(CURVE_PATH_EL, { 'stroke-dashoffset': 0 }, 900);
      }
      // Show annotated curve label
      Tween.run(CURVE_LABEL_G, { opacity: 1 }, 600);

      if (beat.storyId === '1') {
        // Beat 1 — single price: projection lines + callout + rectangle fill
        Tween.run(BEAT1_PROJECTION_G, { opacity: 1 }, 700);
        Tween.run(BEAT1_CALLOUT_G, { opacity: 1 }, 700);
        Tween.run(BEAT1_FILL_PATH, { opacity: 1 }, 700);
        Tween.run(BEAT2_FILL_PATH, { opacity: 0 }, 300);
        Tween.run(BEAT2C_GAP_PATH, { opacity: 0 }, 300);
        Tween.run(BEAT2C_GAP_LABEL, { opacity: 0 }, 300);
        Tween.run(BEAT2D_FILL_PATH, { opacity: 0 }, 300);

        // Beat 1 — exactly one orange dot on the curve.
        for (let i = 0; i < 7; i++) {
          const dot = DOTS[i];
          if (i === 0) {
            const p = curve.sampleAt(CURVE_DOTS_T[0]);
            dot.setAttribute('fill', 'var(--brand-orange)');
            dot.setAttribute('r', '8');
            Tween.run(dot, { cx: p.x, cy: p.y, opacity: 1 }, 500);
          } else {
            dot.setAttribute('opacity', '0');
            Tween.run(dot, { opacity: 0 }, 300);
          }
        }
      } else if (beat.storyId === '2') {
        // Beat 2 — 7 dots + stairstep fill (no gap callout yet)
        Tween.run(BEAT1_PROJECTION_G, { opacity: 0 }, 300);
        Tween.run(BEAT1_CALLOUT_G, { opacity: 0 }, 300);
        Tween.run(BEAT1_FILL_PATH, { opacity: 0 }, 300);
        Tween.run(BEAT2_FILL_PATH, { opacity: 1 }, 700);
        Tween.run(BEAT2C_GAP_PATH, { opacity: 0 }, 300);
        Tween.run(BEAT2C_GAP_LABEL, { opacity: 0 }, 300);
        Tween.run(BEAT2D_FILL_PATH, { opacity: 0 }, 300);

        // Beat 2 — all 7 orange dots fade in along the curve, staggered.
        for (let i = 0; i < 7; i++) {
          const dot = DOTS[i];
          dot.setAttribute('fill', 'var(--brand-orange)');
          dot.setAttribute('r', i === 0 ? '8' : '6');
          const p = curve.sampleAt(CURVE_DOTS_T[i]);
          scheduleBeat(() => {
            if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].storyId === '2') {
              Tween.run(dot, { cx: p.x, cy: p.y, opacity: 1 }, 500);
            }
          }, i * 80);
        }
      } else if (beat.storyId === '2c') {
        // Beat 2c — same 7 dots + stairstep, PLUS gap wedges + callout.
        // Hide the "Optimal pricing curve" label so the focus stays on the gap message.
        Tween.run(BEAT1_PROJECTION_G, { opacity: 0 }, 300);
        Tween.run(BEAT1_CALLOUT_G, { opacity: 0 }, 300);
        Tween.run(BEAT1_FILL_PATH, { opacity: 0 }, 300);
        Tween.run(CURVE_LABEL_G, { opacity: 0 }, 300);
        Tween.run(BEAT2_FILL_PATH, { opacity: 1 }, 400);
        Tween.run(BEAT2C_GAP_PATH, { opacity: 1 }, 800);
        Tween.run(BEAT2D_FILL_PATH, { opacity: 0 }, 300);
        // Callout reveals after wedges to draw the eye
        scheduleBeat(() => {
          if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].storyId === '2c') {
            Tween.run(BEAT2C_GAP_LABEL, { opacity: 1 }, 600);
          }
        }, 500);

        // Keep 7 dots in place
        for (let i = 0; i < 7; i++) {
          const dot = DOTS[i];
          dot.setAttribute('fill', 'var(--brand-orange)');
          dot.setAttribute('r', i === 0 ? '8' : '6');
          const p = curve.sampleAt(CURVE_DOTS_T[i]);
          Tween.run(dot, { cx: p.x, cy: p.y, opacity: 1 }, 400);
        }
      } else if (beat.storyId === '2d') {
        // Beat 2d (v7) — Machine learning sets MANY prices along the curve.
        // Full area under the curve is shaded (every price point captured), and
        // dots dot the curve densely so it reads as "a price for every deal".
        Tween.run(BEAT1_PROJECTION_G, { opacity: 0 }, 300);
        Tween.run(BEAT1_CALLOUT_G, { opacity: 0 }, 300);
        Tween.run(BEAT1_FILL_PATH, { opacity: 0 }, 300);
        Tween.run(BEAT2_FILL_PATH, { opacity: 0 }, 400);
        Tween.run(BEAT2C_GAP_PATH, { opacity: 0 }, 400);
        Tween.run(BEAT2C_GAP_LABEL, { opacity: 0 }, 300);
        Tween.run(CURVE_LABEL_G, { opacity: 1 }, 400);

        // Full shaded area under curve — the headline visual for this beat.
        // Reset any prior transform (in case retreating after the 4→5 transition).
        BEAT2D_FILL_PATH.removeAttribute('transform');
        if (CURVE_PATH_EL) CURVE_PATH_EL.removeAttribute('transform');
        // Make sure stroke-dashoffset is reset so the curve is drawn (the 4→5
        // morph may have left it with a stale value if we retreated mid-tween).
        if (CURVE_PATH_EL) CURVE_PATH_EL.setAttribute('stroke-dashoffset', '0');
        Tween.run(BEAT2D_FILL_PATH, { opacity: 1 }, 700);

        // Lay 48 dots evenly along the curve. Use the first 48 dots of the pool.
        const N_ML_DOTS = 48;
        for (let i = 0; i < N_ML_DOTS; i++) {
          const dot = DOTS[i];
          dot.setAttribute('fill', 'var(--brand-orange)');
          // Smaller dots than the 7-step beat — dense, continuous feel.
          dot.setAttribute('r', '3.5');
          // Spread t evenly across the curve with a tiny inset so endpoints
          // sit just inside the chart bounds.
          const t = 0.015 + (i / (N_ML_DOTS - 1)) * 0.97;
          const p = curve.sampleAt(t);
          // Stagger reveal left-to-right for a wave-like "every deal gets a price" feel.
          scheduleBeat(() => {
            if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].storyId === '2d') {
              Tween.run(dot, { cx: p.x, cy: p.y, opacity: 0.95 }, 360);
            }
          }, i * 18);
        }
        // Hide dots beyond the 48 we use (in case retreating from a later beat).
        for (let i = N_ML_DOTS; i < 50; i++) {
          if (parseFloat(DOTS[i].getAttribute('opacity')) > 0) {
            Tween.run(DOTS[i], { opacity: 0 }, 300);
          }
        }
      }

      // Hide all other dots (depends on which beat we're in)
      const _maxDotForBeat = beat.storyId === '2d' ? 48 : 7;
      for (let i = _maxDotForBeat; i < DOTS.length; i++) {
        if (parseFloat(DOTS[i].getAttribute('opacity')) > 0) {
          Tween.run(DOTS[i], { opacity: 0 }, 300);
        }
      }
    };

    // === SEEDED RNG (mulberry32) ===
    // For reproducible scatter positions.
    function seededRng(seed) {
      let s = seed >>> 0;
      return function() {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // Precompute the 500 scatter positions in Slot C (used by Chapter 2)
    const SCATTER_C_POSITIONS = (() => {
      const rng = seededRng(42);
      const slot = STAGE.C;
      const curve = makeCurve(slot);
      const positions = [];
      for (let i = 0; i < DOT_COUNT; i++) {
        const t = rng();
        const onCurve = curve.sampleAt(t);
        // Add jitter around the curve (a real-feeling scatter with a soft trend)
        const jx = (rng() - 0.5) * slot.w * 0.18;
        const jy = (rng() - 0.5) * slot.h * 0.32;
        positions.push({ x: onCurve.x + jx, y: onCurve.y + jy });
      }
      return positions;
    })();

    // === CHAPTER 1.5 — capture comparison (3 panels) ===
    // Three side-by-side panels showing what % of margin you capture with:
    //   (a) one price, (b) ~40 manual tiers, (c) ~70 ML-driven prices.
    // The curve in each panel is a willingness-to-pay yield curve sorted desc.

    const CAPTURE_PANELS = [
      { id: 'one',
        title: 'One Price', count: '1',
        nPrices: 1,
        capture: 54,
        accent: '#5B6A77',     // muted gray
        fillRgba: 'rgba(91, 106, 119, 0.20)',
        strokeRgba: 'rgba(91, 106, 119, 0.7)',
        statColor: 'var(--brand-text)' },
      { id: 'manual',
        title: 'Manual Segmentation', count: '7',
        nPrices: 7,
        capture: 78,
        accent: 'var(--brand-navy)',
        fillRgba: 'rgba(11, 79, 121, 0.28)',
        strokeRgba: 'rgba(11, 79, 121, 0.85)',
        statColor: 'var(--brand-navy)' },
      { id: 'ml',
        title: 'ML Model', count: '74',
        nPrices: 74,
        capture: 92,
        accent: 'var(--brand-orange)',
        fillRgba: 'rgba(234, 106, 10, 0.32)',
        strokeRgba: 'rgba(234, 106, 10, 0.85)',
        statColor: 'var(--brand-orange)' },
    ];

    // Panel geometry inside the 1100×620 stage
    const CAP_GEO = (() => {
      const PANEL_W = 320;
      const GAP = 30;
      const totalW = 3 * PANEL_W + 2 * GAP;          // 1020
      const START_X = (1100 - totalW) / 2;           // 40
      const Y0 = 50;
      const CHART_Y = Y0 + 76;                        // chart top
      const CHART_H = 300;
      const CHART_BOTTOM = CHART_Y + CHART_H;        // 426
      return { PANEL_W, GAP, START_X, Y0, CHART_Y, CHART_H, CHART_BOTTOM };
    })();

    // Yield curve: quarter-circle-like decline, y in [0..1], t in [0..1]
    function yieldCurveY(t) {
      // Smooth descending curve with a long high plateau and a fast tail
      return Math.pow(Math.max(0, 1 - Math.pow(t, 1.5)), 1.05);
    }

    let CAPTURE_GROUP = null;

    function buildCapturePanels() {
      if (CAPTURE_GROUP) return;
      CAPTURE_GROUP = svg('g', { id: 'capture-group', opacity: 0 });
      LAYERS.curve.appendChild(CAPTURE_GROUP);

      const { PANEL_W, GAP, START_X, Y0, CHART_Y, CHART_H, CHART_BOTTOM } = CAP_GEO;

      CAPTURE_PANELS.forEach((panel, idx) => {
        const x0 = START_X + idx * (PANEL_W + GAP);
        const panelG = svg('g', { 'data-panel': panel.id, opacity: 0 });
        panelG.dataset.panelIdx = String(idx);

        // === Title block ===
        const eyebrow = svg('text', {
          x: x0, y: Y0 + 14,
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 10, 'letter-spacing': '0.18em',
          'font-weight': 600, fill: panel.accent,
        });
        eyebrow.textContent = panel.title.toUpperCase();
        panelG.appendChild(eyebrow);

        const titleNum = svg('text', {
          x: x0, y: Y0 + 50,
          'font-size': 30, 'font-weight': 600, fill: 'var(--brand-navy-ink)',
          'letter-spacing': '-0.02em',
        });
        const numSpan = svg('tspan');
        numSpan.textContent = panel.count;
        const lblSpan = svg('tspan', { dx: 8, 'font-size': 14, 'font-weight': 500, fill: 'var(--brand-text-muted)' });
        lblSpan.textContent = panel.nPrices === 1 ? 'price' : 'prices';
        titleNum.appendChild(numSpan);
        titleNum.appendChild(lblSpan);
        panelG.appendChild(titleNum);

        // === Curve & baseline (using the SAME makeCurve() as beats 1/2 — full continuity) ===
        const slot = { x: x0, y: CHART_Y, w: PANEL_W, h: CHART_H };
        const curve = makeCurve(slot);
        // makeCurve maps yNorm 0..1 to y = oy + (1-yNorm)*0.9h + 0.05h
        // → yNorm=1 (top)    at y = oy + 0.05*h
        // → yNorm=0 (bottom) at y = oy + 0.95*h  ← natural curve floor
        // For the shaded fill, anchor to the actual x-axis (CHART_BOTTOM) so it
        // reads as a solid filled region with no awkward gap above the axis.
        const baselineY = CHART_BOTTOM;
        const topRefY   = slot.y + slot.h * 0.05;

        // === Y-axis gridlines + tick labels (match beats 1/2: $40-$240) ===
        // 5 ticks at $50, $100, $150, $200, $250 mapped onto the curve's y-range.
        // We map "$" to fraction of (baselineY → topRefY), so $250 sits near top.
        const yTickValues = [50, 100, 150, 200, 250];
        const Y_MIN = 0, Y_MAX = 280;  // axis range in $
        yTickValues.forEach(v => {
          const frac = (v - Y_MIN) / (Y_MAX - Y_MIN);  // 0..1
          const yPos = baselineY - frac * (baselineY - topRefY);
          // Gridline
          panelG.appendChild(svg('line', {
            x1: slot.x, y1: yPos, x2: slot.x + slot.w, y2: yPos,
            stroke: 'var(--grid-line-soft)', 'stroke-width': 1,
          }));
          // Tick label
          const lab = svg('text', {
            x: slot.x - 6, y: yPos + 3,
            'text-anchor': 'end',
            'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
            'font-size': 10, fill: 'var(--brand-text-soft)',
          });
          lab.textContent = '$' + v;
          panelG.appendChild(lab);
        });

        // === Axis baselines ===
        panelG.appendChild(svg('line', {
          x1: slot.x, y1: CHART_BOTTOM, x2: slot.x + slot.w, y2: CHART_BOTTOM,
          stroke: 'var(--axis-line)', 'stroke-width': 1,
        }));
        panelG.appendChild(svg('line', {
          x1: slot.x, y1: CHART_Y, x2: slot.x, y2: CHART_BOTTOM,
          stroke: 'var(--axis-line)', 'stroke-width': 1,
        }));

        // === X-axis tick labels (match beats 1/2: 0–10k units) ===
        const xTickFracs = [0, 0.5, 1.0];
        const xTickLabels = ['0', '5k', '10k'];
        xTickFracs.forEach((t, i) => {
          const xPos = slot.x + t * slot.w;
          panelG.appendChild(svg('line', {
            x1: xPos, y1: CHART_BOTTOM, x2: xPos, y2: CHART_BOTTOM + 4,
            stroke: 'var(--axis-tick)', 'stroke-width': 1,
          }));
          const lab = svg('text', {
            x: xPos, y: CHART_BOTTOM + 16,
            'text-anchor': 'middle',
            'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
            'font-size': 10, fill: 'var(--brand-text-soft)',
          });
          lab.textContent = xTickLabels[i];
          panelG.appendChild(lab);
        });

        // === Stairstep / rectangle fill (the "captured area") ===
        let fillD = '';
        if (panel.nPrices === 1) {
          // Single price: rectangle with top-right corner ON the curve.
          // Pick t* = 0.5 (mid-quantity) as the "single optimal price" point.
          const topPt = curve.sampleAt(0.50);
          fillD = `M ${slot.x} ${baselineY} L ${slot.x} ${topPt.y} L ${topPt.x} ${topPt.y} L ${topPt.x} ${baselineY} Z`;
        } else {
          // Stairstep approximation: nPrices steps under the curve.
          // Each step's top-RIGHT corner sits ON the curve at its right edge.
          // This guarantees the step's top is at-or-below the curve everywhere in
          // its x range — no shading peeks above the curve.
          const steps = panel.nPrices;
          const parts = [`M ${slot.x} ${baselineY}`];
          for (let i = 0; i < steps; i++) {
            const t0 = i / steps;
            const t1 = (i + 1) / steps;
            const pt1 = curve.sampleAt(t1);
            const x0p = slot.x + t0 * slot.w;
            const x1p = slot.x + t1 * slot.w;
            parts.push(`L ${x0p} ${pt1.y}`);
            parts.push(`L ${x1p} ${pt1.y}`);
          }
          parts.push(`L ${slot.x + slot.w} ${baselineY} Z`);
          fillD = parts.join(' ');
        }

        panelG.appendChild(svg('path', {
          d: fillD,
          fill: panel.fillRgba,
          stroke: panel.strokeRgba,
          'stroke-width': panel.nPrices === 1 ? 1.5 : 1,
          'stroke-linejoin': 'miter',
        }));

        // Curve drawn ON TOP (matches beats 1/2's stroke)
        panelG.appendChild(svg('path', {
          d: curve.d,
          fill: 'none',
          stroke: 'var(--brand-navy)',
          'stroke-width': 2,
          'stroke-linecap': 'round',
          opacity: 0.9,
        }));

        // === Stat block below ===
        const statY = CHART_BOTTOM + 56;
        const statEyebrow = svg('text', {
          x: x0, y: statY,
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 10, 'letter-spacing': '0.18em',
          'font-weight': 600, fill: 'var(--brand-text-muted)',
        });
        statEyebrow.textContent = 'MARGIN CAPTURED';
        panelG.appendChild(statEyebrow);

        const statNum = svg('text', {
          x: x0, y: statY + 38,
          'font-size': 40, 'font-weight': 700, fill: panel.statColor,
          'letter-spacing': '-0.03em',
        });
        statNum.textContent = panel.capture + '%';
        panelG.appendChild(statNum);

        // Delta vs One Price (small chip on panels 2 & 3)
        if (idx > 0) {
          const delta = panel.capture - CAPTURE_PANELS[0].capture;
          const deltaChip = svg('text', {
            x: x0 + 110, y: statY + 32,
            'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
            'font-size': 12, 'font-weight': 600,
            fill: panel.statColor,
            'letter-spacing': '0.02em',
          });
          deltaChip.textContent = `+${delta}pp`;
          panelG.appendChild(deltaChip);
        }

        CAPTURE_GROUP.appendChild(panelG);
      });
    }

    function hideCapturePanels(dur) {
      if (!CAPTURE_GROUP) return;
      const d = dur === undefined ? 300 : dur;
      Tween.run(CAPTURE_GROUP, { opacity: 0 }, d);
      CAPTURE_GROUP.querySelectorAll('g[data-panel]').forEach(p => {
        Tween.run(p, { opacity: 0 }, d);
      });
    }

    CHAPTERS['capture'] = function(beat, prevBeat) {
      buildCapturePanels();

      const fromBeat2d = prevBeat && prevBeat.storyId === '2d';

      // Hide chapter 1 visuals (curve + 2d fill handled separately below)
      if (CURVE_LABEL_G)        Tween.run(CURVE_LABEL_G, { opacity: 0 }, 300);
      if (BEAT1_PROJECTION_G)   Tween.run(BEAT1_PROJECTION_G, { opacity: 0 }, 300);
      if (BEAT1_CALLOUT_G)      Tween.run(BEAT1_CALLOUT_G, { opacity: 0 }, 300);
      if (BEAT1_FILL_PATH)      Tween.run(BEAT1_FILL_PATH, { opacity: 0 }, 300);
      if (BEAT2_FILL_PATH)      Tween.run(BEAT2_FILL_PATH, { opacity: 0 }, 300);
      if (BEAT2C_GAP_PATH)      Tween.run(BEAT2C_GAP_PATH, { opacity: 0 }, 300);
      if (BEAT2C_GAP_LABEL)     Tween.run(BEAT2C_GAP_LABEL, { opacity: 0 }, 300);
      const axesC = document.getElementById('axes-c');
      if (axesC) Tween.run(axesC, { opacity: 0 }, 300);
      DOTS.forEach(d => Tween.run(d, { opacity: 0 }, 300));

      // Reveal capture group container
      Tween.run(CAPTURE_GROUP, { opacity: 1 }, 300);
      const panelEls = CAPTURE_GROUP.querySelectorAll('g[data-panel]');
      // Pre-hide all panels (they may have been left visible from a prior visit)
      panelEls.forEach(p => p.setAttribute('opacity', '0'));

      if (fromBeat2d && CURVE_PATH_EL && BEAT2D_FILL_PATH) {
        // === V7: 4 → 5 slide transition ===
        // The slot-C curve + full shading "slides" over to where the ML panel's
        // chart sits in beat 5, then the One Price and Manual Segmentation panels
        // fade in alongside it.
        // ML panel chart slot: (740, 126, 320, 300). Slot C: (200, 100, 700, 460).
        const targetScaleX = 320 / 700;   // 0.4571
        const targetScaleY = 300 / 460;   // 0.6522
        const targetTx = 740 - 200 * targetScaleX;
        const targetTy = 126 - 100 * targetScaleY;

        // Cancel any leave-hook fade-outs the previous chapter queued on these
        // elements — we need them visible for the slide.
        Tween.active.delete(CURVE_PATH_EL);
        Tween.active.delete(BEAT2D_FILL_PATH);

        // v8: snap mode (e.g. user jumped forward 2->5 or retreated 6->5) — no
        // morph to play. Hide the ghost curve; the ML panel underneath carries
        // the visual on its own, and the other panels reveal instantly below.
        if (APP.snapMode) {
          CURVE_PATH_EL.setAttribute('opacity', '0');
          BEAT2D_FILL_PATH.setAttribute('opacity', '0');
          CURVE_PATH_EL.removeAttribute('transform');
          BEAT2D_FILL_PATH.removeAttribute('transform');
          panelEls.forEach(p => p.setAttribute('opacity', '1'));
          return;
        }

        // Start at identity (i.e., slot-C native position).
        CURVE_PATH_EL.setAttribute('transform', 'translate(0 0) scale(1 1)');
        BEAT2D_FILL_PATH.setAttribute('transform', 'translate(0 0) scale(1 1)');
        CURVE_PATH_EL.setAttribute('opacity', '1');
        BEAT2D_FILL_PATH.setAttribute('opacity', '1');

        const MORPH_DUR = 800;
        const t0 = performance.now();
        (function tickMorph(now) {
          if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].chapter !== 'capture') return;
          const tt = Math.min(1, (now - t0) / MORPH_DUR);
          const e = Tween.ease(tt);
          const sx = 1 + (targetScaleX - 1) * e;
          const sy = 1 + (targetScaleY - 1) * e;
          const tx = targetTx * e;
          const ty = targetTy * e;
          const xform = `translate(${tx} ${ty}) scale(${sx} ${sy})`;
          CURVE_PATH_EL.setAttribute('transform', xform);
          BEAT2D_FILL_PATH.setAttribute('transform', xform);
          if (tt < 1) requestAnimationFrame(tickMorph);
        })(performance.now());

        // ML panel (idx 2) reveals JUST as the morph lands underneath it.
        // v9 feedback: remove the orange "color pulse" on the ML curve — fade the
        // morphed ghost OUT as the ML panel arrives so there's no overlap of the
        // orange ghost over the panel's navy curve.
        scheduleBeat(() => {
          if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].chapter === 'capture') {
            Tween.run(panelEls[2], { opacity: 1 }, 300);
          }
          if (CURVE_PATH_EL) Tween.run(CURVE_PATH_EL, { opacity: 0 }, 300);
          if (BEAT2D_FILL_PATH) Tween.run(BEAT2D_FILL_PATH, { opacity: 0 }, 300);
        }, MORPH_DUR - 150);
        // v9 feedback: the two LEFT panels (One Price + Manual Segmentation) fade
        // in simultaneously AND faster, after the ML panel anchors.
        scheduleBeat(() => {
          if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].chapter === 'capture') {
            Tween.run(panelEls[0], { opacity: 1 }, 280);
            Tween.run(panelEls[1], { opacity: 1 }, 280);
          }
        }, MORPH_DUR + 250);
      } else {
        // Standard reveal (not coming from 2d): hide slot-C curve + cascade panels L→R.
        if (CURVE_PATH_EL)    Tween.run(CURVE_PATH_EL, { opacity: 0 }, 300);
        if (BEAT2D_FILL_PATH) Tween.run(BEAT2D_FILL_PATH, { opacity: 0 }, 300);
        panelEls.forEach((p, i) => {
          scheduleBeat(() => Tween.run(p, { opacity: 1 }, 500), 150 + i * 220);
        });
      }
    };

    // === CHAPTER 2 — raw scatter ===
    // Beat-3 annotations: stats block top-right + 3 highlighted customers + "same volume" guide
    // Sub-grouped so beat 4 can persist the guide while swapping stats + callouts.
    let BEAT3_ANNO_G = null;
    let BEAT3_STATS_G = null;
    let BEAT3_CALLOUTS_G = null;
    let BEAT3_GUIDE_G = null;

    function ensureBeat3Annotations() {
      if (BEAT3_ANNO_G) return;
      BEAT3_ANNO_G = svg('g', { id: 'beat3-anno', opacity: 0 });
      LAYERS.labels.appendChild(BEAT3_ANNO_G);

      // === STATS sub-group (replaced in beat 4 by variance stat) ===
      BEAT3_STATS_G = svg('g', { 'data-role': 'stats', opacity: 1 });
      const statsX = STAGE.C.x + STAGE.C.w - 4;
      const statsY = STAGE.C.y + 8;
      const stat1 = svg('text', {
        x: statsX, y: statsY,
        'text-anchor': 'end',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 11, 'letter-spacing': '0.14em', 'font-weight': 700,
        fill: 'var(--brand-navy-ink)',
      });
      stat1.textContent = 'n = 503 DEALS';
      BEAT3_STATS_G.appendChild(stat1);
      const stat2 = svg('text', {
        x: statsX, y: statsY + 16,
        'text-anchor': 'end',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 10, 'letter-spacing': '0.10em',
        fill: 'var(--brand-text-soft)',
      });
      stat2.textContent = '24 MONTHS · 18 SKUs';
      BEAT3_STATS_G.appendChild(stat2);
      BEAT3_ANNO_G.appendChild(BEAT3_STATS_G);

      // === GUIDE sub-group (kept visible in beat 4) ===
      BEAT3_GUIDE_G = svg('g', { 'data-role': 'guide', opacity: 1 });
      const targetX = STAGE.C.x + STAGE.C.w * 0.30;
      BEAT3_GUIDE_G.appendChild(svg('line', {
        x1: targetX, y1: STAGE.C.y + 8,
        x2: targetX, y2: STAGE.C.y + STAGE.C.h,
        stroke: 'var(--brand-orange)',
        'stroke-width': 1, 'stroke-opacity': 0.45,
        'stroke-dasharray': '4 5',
      }));
      const guideLbl = svg('text', {
        x: targetX, y: STAGE.C.y - 4,
        'text-anchor': 'middle',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 10, 'letter-spacing': '0.16em', 'font-weight': 600,
        fill: 'var(--brand-orange)',
      });
      guideLbl.textContent = 'SAME VOLUME';
      BEAT3_GUIDE_G.appendChild(guideLbl);
      BEAT3_ANNO_G.appendChild(BEAT3_GUIDE_G);

      // === CALLOUTS sub-group (replaced in beat 4 by region-colored callouts) ===
      BEAT3_CALLOUTS_G = svg('g', { 'data-role': 'callouts', opacity: 1 });
      const priceToY = (p) => {
        const frac = (p - 40) / (240 - 40);
        return STAGE.C.y + STAGE.C.h - frac * STAGE.C.h;
      };
      // Labels live in a clean column on the right side with leader lines back to
      // the dots — keeps text well clear of the dot halos at top/middle/bottom.
      const LABEL_X = STAGE.C.x + STAGE.C.w * 0.50;
      const callouts = [
        { label: 'Customer A', price: 172, x: targetX,      y: priceToY(172), labelY: STAGE.C.y + 132 },
        { label: 'Customer C', price: 156, x: targetX - 7,  y: priceToY(156), labelY: STAGE.C.y + 200 },
        { label: 'Customer B', price: 108, x: targetX + 4,  y: priceToY(108), labelY: STAGE.C.y + 300 },
      ];
      callouts.forEach((c) => {
        BEAT3_CALLOUTS_G.appendChild(svg('circle', {
          cx: c.x, cy: c.y, r: 9,
          fill: 'none', stroke: 'var(--brand-orange)',
          'stroke-width': 1.5, 'stroke-opacity': 0.9,
        }));
        BEAT3_CALLOUTS_G.appendChild(svg('circle', {
          cx: c.x, cy: c.y, r: 4,
          fill: 'var(--brand-orange)',
        }));
        const lx = LABEL_X;
        const ly = c.labelY;
        // Leader: dot → label start (small offset so it doesn't touch text)
        BEAT3_CALLOUTS_G.appendChild(svg('line', {
          x1: c.x + 9, y1: c.y,
          x2: lx - 6, y2: ly + 4,
          stroke: 'var(--brand-orange)', 'stroke-width': 1.1,
          'stroke-opacity': 0.7,
        }));
        const labelEyebrow = svg('text', {
          x: lx, y: ly,
          'text-anchor': 'start',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 9.5, 'letter-spacing': '0.14em', 'font-weight': 600,
          fill: 'var(--brand-text-muted)',
        });
        labelEyebrow.textContent = c.label.toUpperCase();
        BEAT3_CALLOUTS_G.appendChild(labelEyebrow);
        const labelPrice = svg('text', {
          x: lx, y: ly + 18,
          'text-anchor': 'start',
          'font-size': 16, 'font-weight': 700, fill: 'var(--brand-navy-ink)',
          'letter-spacing': '-0.01em',
        });
        labelPrice.textContent = '$' + c.price;
        BEAT3_CALLOUTS_G.appendChild(labelPrice);
      });
      BEAT3_ANNO_G.appendChild(BEAT3_CALLOUTS_G);
    }

    CHAPTERS['raw-scatter'] = function(beat, prevBeat) {
      ensureCurveC();
      ensureBeat3Annotations();
      // Hide the optimal curve entirely — the "looks random" framing should
      // not be undercut by the very curve we're trying to discover later.
      Tween.run(CURVE_PATH_EL, { opacity: 0 }, 600);
      if (CURVE_LABEL_G) Tween.run(CURVE_LABEL_G, { opacity: 0 }, 600);
      // Hide beat-1 annotations if they were visible
      if (BEAT1_CALLOUT_G)    Tween.run(BEAT1_CALLOUT_G, { opacity: 0 }, 300);
      if (BEAT1_PROJECTION_G) Tween.run(BEAT1_PROJECTION_G, { opacity: 0 }, 300);
      // Hide beat-4 annotations if retreating from regions
      if (typeof hideBeat4Annotations === 'function') hideBeat4Annotations(200);
      // Restore beat-3 sub-groups in case they were hidden by beat 4
      if (BEAT3_STATS_G)    Tween.run(BEAT3_STATS_G, { opacity: 1 }, 300);
      if (BEAT3_CALLOUTS_G) Tween.run(BEAT3_CALLOUTS_G, { opacity: 1 }, 300);
      if (BEAT3_GUIDE_G)    Tween.run(BEAT3_GUIDE_G, { opacity: 1 }, 300);

      // Hide region-chapter chrome on retreat from 4A/4B
      if (typeof REGION_LEGEND_EL !== 'undefined' && REGION_LEGEND_EL) {
        Tween.run(REGION_LEGEND_EL, { opacity: 0 }, 200);
      }
      if (typeof hideBeat4BChrome === 'function') hideBeat4BChrome(false);
      if (typeof layoutRegionLegend === 'function') layoutRegionLegend('vertical-C');

      // Restore slot-C axes (in case they were hidden by 4B and user retreated to 3)
      const axes3 = document.getElementById('axes-c');
      if (axes3) Tween.run(axes3, { opacity: 1 }, 300);

      // All 500 dots become gray scatter; first 7 also tween from their orange-on-curve positions
      DOTS.forEach((dot, i) => {
        dot.setAttribute('fill', 'var(--dot-gray)');
        dot.setAttribute('r', '3');
        const target = SCATTER_C_POSITIONS[i];
        Tween.run(dot, { cx: target.x, cy: target.y, opacity: 0.55 }, 700);
      });

      // Reveal beat-3 annotations after the scatter settles
      scheduleBeat(() => {
        if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].chapter === 'raw-scatter') {
          Tween.run(BEAT3_ANNO_G, { opacity: 1 }, 500);
        }
      }, 600);
    };

    // === CHAPTER 3 — regions revealed ===
    // Each dot is assigned a region (cluster) in a way that creates a visible vertical separation
    // when colored. We do it via vertical band assignment in the scatter.
    const REGIONS = [
      { id: 'california',    color: 'var(--region-california)',    label: 'California',    yRank: 0, meanPrice: 172 },
      { id: 'pnw',           color: 'var(--region-pnw)',           label: 'PNW',           yRank: 1, meanPrice: 148 },
      { id: 'southwest',     color: 'var(--region-southwest)',     label: 'Southwest',     yRank: 2, meanPrice: 124 },
      { id: 'great-plains',  color: 'var(--region-great-plains)',  label: 'Great Plains',  yRank: 3, meanPrice: 96  },
    ];

    // Precompute region assignment per dot, biased so the regions form bands in price (y).
    // California = highest prices (low yRank top), Great Plains = lowest prices.
    const DOT_REGION = (() => {
      const rng = seededRng(7);
      const result = new Array(DOT_COUNT);
      // Sort dots by y (lower y in SVG = higher price = California)
      const order = SCATTER_C_POSITIONS.map((p, i) => ({ i, y: p.y })).sort((a, b) => a.y - b.y);
      // Assign to 4 quartiles with some noise so the bands feel organic, not perfect
      for (let k = 0; k < order.length; k++) {
        const quartile = Math.floor((k / order.length) * 4);
        // 12% chance to swap with a neighboring region for natural messiness
        let r = quartile;
        if (rng() < 0.12) r = clamp(r + (rng() < 0.5 ? -1 : 1), 0, 3);
        result[order[k].i] = r;
      }
      return result;
    })();

    // Precompute jitter-plot positions in Slot R (4 vertical strips, one per region)
    // Realistic vertical smears: Gaussian spread + occasional outliers, with
    // overlap between adjacent regions so the picture looks like real-world data,
    // not a textbook diagram.
    const JITTER_R_POSITIONS = (() => {
      const rng = seededRng(99);
      const slot = STAGE.R;
      const stripW = slot.w / 4;
      // Region centers — same descending order (California highest price = top of slot)
      const regionMeanY = [
        slot.y + slot.h * 0.22,
        slot.y + slot.h * 0.40,
        slot.y + slot.h * 0.58,
        slot.y + slot.h * 0.76,
      ];
      // Per-region vertical std dev as fraction of slot height. Bigger = more spread.
      // Adjacent regions are ~0.18*h apart; std ~0.09 gives healthy overlap.
      const regionStdY = [0.092, 0.085, 0.090, 0.080];

      // Box–Muller Gaussian generator
      function gaussian() {
        let u = 0, v = 0;
        while (u === 0) u = rng();
        while (v === 0) v = rng();
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
      }

      return DOT_REGION.map((r) => {
        // Horizontal jitter: clustered around strip center, sometimes wider for realism.
        // Use Gaussian * stripW for natural cluster shape (not uniform — has a center).
        const xSpread = gaussian() * stripW * 0.18;
        const cx = slot.x + stripW * (r + 0.5) + xSpread;

        // Vertical jitter: Gaussian around region mean, with occasional outliers.
        // 8% chance of a "wild" data point (3x std) — real datasets always have these.
        let vSpread = gaussian() * slot.h * regionStdY[r];
        if (rng() < 0.08) vSpread *= 2.4;
        const cy = regionMeanY[r] + vSpread;

        // Soft-clamp to slot bounds (let some sit slightly outside for "outlier" feel)
        return {
          x: Math.max(slot.x + 4, Math.min(slot.x + slot.w - 4, cx)),
          y: Math.max(slot.y + 6, Math.min(slot.y + slot.h - 6, cy)),
        };
      });
    })();

    // Precompute scatter positions compressed into Slot L (for beat 4B left-pane)
    const SCATTER_L_POSITIONS = (() => {
      const slot = STAGE.L;
      const cSlot = STAGE.C;
      return SCATTER_C_POSITIONS.map(p => ({
        x: slot.x + (p.x - cSlot.x) * (slot.w / cSlot.w),
        y: slot.y + (p.y - cSlot.y) * (slot.h / cSlot.h),
      }));
    })();

    // Region legend element (created once, shown in 4A and 4B)
    // Anchored to the top-right of slot C in 4A, repositioned to span slot L in 4B.
    let REGION_LEGEND_EL = null;
    function ensureRegionLegend() {
      if (REGION_LEGEND_EL) return REGION_LEGEND_EL;
      const g = svg('g', { id: 'region-legend', opacity: 0, transform: `translate(${STAGE.C.x + STAGE.C.w - 130}, ${STAGE.C.y + 8})` });
      // Subtle background plate so the legend reads cleanly above any stray scatter dots
      const plate = svg('rect', { 'data-role': 'legend-plate', x: -8, y: -4, width: 126, height: 18 * REGIONS.length + 8, rx: 4, ry: 4, fill: 'var(--brand-bg, #fff)', 'fill-opacity': 0.85, stroke: 'var(--brand-line, #d8d8d8)', 'stroke-opacity': 0.6 });
      g.appendChild(plate);
      REGIONS.forEach((r, i) => {
        const row = svg('g', { 'data-role': 'legend-row', 'data-i': String(i), transform: `translate(0, ${10 + i * 18})` });
        const dot = svg('circle', { 'data-role': 'legend-dot', cx: 0, cy: -3, r: 4.5, fill: r.color });
        row.appendChild(dot);
        const t = svg('text', { 'data-role': 'legend-text', x: 12, y: 0, 'font-size': 12, fill: 'var(--brand-text)' });
        t.textContent = r.label;
        row.appendChild(t);
        // Mean price for the region (shown in horizontal-C mode; hidden in other modes)
        const p = svg('text', {
          'data-role': 'legend-price', x: 80, y: 0,
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 12, 'font-weight': 700, fill: r.color,
          opacity: 0,
        });
        p.textContent = '$' + r.meanPrice;
        row.appendChild(p);
        g.appendChild(row);
      });
      LAYERS.labels.appendChild(g);
      REGION_LEGEND_EL = g;
      return g;
    }

    // Lay the legend out as:
    //   'vertical-C':   stacked top-right of slot C (default, 4A historic)
    //   'horizontal-C': strip across the top of slot C, with mean prices (4A new)
    //   'horizontal-L': strip across the top of slot L (4B)
    function layoutRegionLegend(mode) {
      const g = REGION_LEGEND_EL;
      if (!g) return;
      const plate = g.querySelector('[data-role="legend-plate"]');
      const rows = g.querySelectorAll('[data-role="legend-row"]');
      if (mode === 'horizontal-C') {
        // Strip across the top of slot C, MEAN PRICE inline per chip.
        // v9 feedback: lifted higher (was -42) so the legend clears the SAME VOLUME
        // guide label and the topmost dots inside the chart.
        g.setAttribute('transform', `translate(${STAGE.C.x}, ${STAGE.C.y - 78})`);
        const stripW = STAGE.C.w;
        const chipW = stripW / REGIONS.length;
        rows.forEach((row, i) => {
          row.setAttribute('transform', `translate(${i * chipW + 12}, 18)`);
          const dot = row.querySelector('[data-role="legend-dot"]');
          const txt = row.querySelector('[data-role="legend-text"]');
          const prc = row.querySelector('[data-role="legend-price"]');
          if (dot) { dot.setAttribute('cx', '0'); dot.setAttribute('cy', '-1'); dot.setAttribute('r', '5'); }
          if (txt) {
            txt.setAttribute('x', '14');
            txt.setAttribute('y', '4');
            txt.setAttribute('font-size', '13');
            txt.setAttribute('font-weight', '600');
            txt.setAttribute('fill', 'var(--brand-navy-ink)');
          }
          if (prc) {
            prc.setAttribute('x', '14');
            prc.setAttribute('y', '22');
            prc.setAttribute('opacity', '1');
          }
        });
        if (plate) {
          plate.setAttribute('x', '0');
          plate.setAttribute('y', '0');
          plate.setAttribute('width', String(stripW));
          plate.setAttribute('height', '36');
          plate.setAttribute('fill-opacity', '0');
          plate.setAttribute('stroke-opacity', '0');
        }
      } else if (mode === 'horizontal-L') {
        // Horizontal strip across slot L: 4 chips spaced evenly above the panel.
        g.setAttribute('transform', `translate(${STAGE.L.x}, ${STAGE.L.y - 32})`);
        const stripW = STAGE.L.w;
        const chipW = stripW / REGIONS.length;
        rows.forEach((row, i) => {
          row.setAttribute('transform', `translate(${i * chipW + 12}, 12)`);
          const dot = row.querySelector('[data-role="legend-dot"]');
          const txt = row.querySelector('[data-role="legend-text"]');
          const prc = row.querySelector('[data-role="legend-price"]');
          if (dot) { dot.setAttribute('cx', '0'); dot.setAttribute('cy', '0'); dot.setAttribute('r', '4.5'); }
          if (txt) {
            txt.setAttribute('x', '12');
            txt.setAttribute('y', '4');
            txt.setAttribute('font-size', '12');
            txt.setAttribute('font-weight', '400');
            txt.setAttribute('fill', 'var(--brand-text)');
          }
          if (prc) prc.setAttribute('opacity', '0');
        });
        if (plate) {
          plate.setAttribute('x', '-4');
          plate.setAttribute('y', '0');
          plate.setAttribute('width', String(stripW + 8));
          plate.setAttribute('height', '24');
          plate.setAttribute('fill-opacity', '0.85');
          plate.setAttribute('stroke-opacity', '0.6');
        }
      } else {
        // Vertical stack anchored to top-right of slot C.
        g.setAttribute('transform', `translate(${STAGE.C.x + STAGE.C.w - 130}, ${STAGE.C.y + 8})`);
        rows.forEach((row, i) => {
          row.setAttribute('transform', `translate(0, ${10 + i * 18})`);
          const dot = row.querySelector('[data-role="legend-dot"]');
          const txt = row.querySelector('[data-role="legend-text"]');
          const prc = row.querySelector('[data-role="legend-price"]');
          if (dot) { dot.setAttribute('cx', '0'); dot.setAttribute('cy', '-3'); dot.setAttribute('r', '4.5'); }
          if (txt) {
            txt.setAttribute('x', '12');
            txt.setAttribute('y', '0');
            txt.setAttribute('font-size', '12');
            txt.setAttribute('font-weight', '400');
            txt.setAttribute('fill', 'var(--brand-text)');
          }
          if (prc) prc.setAttribute('opacity', '0');
        });
        if (plate) {
          plate.setAttribute('x', '-8');
          plate.setAttribute('y', '-4');
          plate.setAttribute('width', '126');
          plate.setAttribute('height', String(18 * REGIONS.length + 8));
          plate.setAttribute('fill-opacity', '0.85');
          plate.setAttribute('stroke-opacity', '0.6');
        }
      }
    }

    // === BEAT 4B — RIGHT-PANEL CHROME (jitter axes, labels, captions) ===
    // Built once on first 4B entry, then opacity-toggled. Cleaned up on exit
    // from chapter 'regions' (handled by entering the next chapter via removeBeat4BChrome).
    const BEAT_4B_CHROME = { built: false, group: null, twinsGroup: null, twins: [] };

    function buildBeat4BChrome() {
      if (BEAT_4B_CHROME.built) return;

      // === TWIN DOTS — Option A: clone each of the 500 DOTS into a parallel right-panel group ===
      // Same 500 data points shown on both sides; twins live in slot R as the jitter.
      // NOTE: group has opacity 1 so per-twin opacity tweens are visible.
      const twinsGroup = svg('g', { id: 'jitter-twins', opacity: 1 });
      LAYERS.dots.appendChild(twinsGroup);
      const twins = [];
      for (let i = 0; i < DOT_COUNT; i++) {
        const region = REGIONS[DOT_REGION[i]];
        const twin = svg('circle', {
          cx: 0, cy: 0, r: 3,
          fill: region.color,
          opacity: '0',
        });
        twin.dataset.idx = String(i);
        twinsGroup.appendChild(twin);
        twins.push(twin);
      }
      BEAT_4B_CHROME.twins = twins;
      BEAT_4B_CHROME.twinsGroup = twinsGroup;

      // === RIGHT-PANEL CHROME GROUP (axes, labels, captions, panel y-label) ===
      // Lives in LAYERS.axes for proper z-order (behind dots).
      const chromeG = svg('g', { id: 'beat-4b-chrome', opacity: 0 });

      // X-axis category labels under slot R — derived from REGIONS (single source of truth).
      const REGION_LABELS = REGIONS.map(r => r.label);
      const xLabelsG = svg('g', { id: 'jitter-x-labels' });
      REGION_LABELS.forEach((name, i) => {

          'font-size': 12,

        lbl.textContent = name;
        xLabelsG.appendChild(lbl);
      });
      chromeG.appendChild(xLabelsG);

      // Y-axis "Price" label on slot R (Task 2 standard)
      const yLabelR = svg('text', {
        x: STAGE.R.x - 36,

        'dominant-baseline': 'middle',
        'font-size': 14,

        transform: `rotate(-90 ${STAGE.R.x - 36} ${STAGE.R.y + STAGE.R.h / 2})`,
      });

      chromeG.appendChild(yLabelR);

      // Y-axis "Price" label on slot L for parity with slot R (Task 2 standard)
      const yLabelL = svg('text', {

        'text-anchor': 'middle',
        'dominant-baseline': 'middle',
        'font-size': 14,
        fill: 'var(--brand-text-muted)',
        transform: `rotate(-90 ${STAGE.L.x - 16} ${STAGE.L.y + STAGE.L.h / 2})`,
      });
      yLabelL.textContent = 'Price';
      chromeG.appendChild(yLabelL);

      // X-axis "Quantity" label on slot L
      const xLabelL = svg('text', {
        x: STAGE.L.x + STAGE.L.w / 2,

        'text-anchor': 'middle',
        'font-size': 12,
        fill: 'var(--brand-text-muted)',
      });
      xLabelL.textContent = 'Quantity';
      chromeG.appendChild(xLabelL);

      // Panel captions below each panel
      const captionL = svg('text', {
        x: STAGE.L.x + STAGE.L.w / 2,
        y: STAGE.L.y + STAGE.L.h + 56,
        'text-anchor': 'middle',
        'font-size': 14,
        fill: 'var(--brand-text-muted)',
      });
      captionL.textContent = 'Same dots, by region.';
      chromeG.appendChild(captionL);

      const captionR = svg('text', {
        x: STAGE.R.x + STAGE.R.w / 2,
        y: STAGE.R.y + STAGE.R.h + 56,
        'text-anchor': 'middle',
        'font-size': 14,
        fill: 'var(--brand-text-muted)',
      });
      captionR.textContent = 'Spread out by region.';
      chromeG.appendChild(captionR);

      LAYERS.axes.appendChild(chromeG);
      BEAT_4B_CHROME.group = chromeG;
      BEAT_4B_CHROME.built = true;
    }

    function hideBeat4BChrome(immediate) {
      if (!BEAT_4B_CHROME.built) return;
      const dur = immediate ? 0 : 200;
      Tween.run(BEAT_4B_CHROME.group, { opacity: 0 }, dur);
      BEAT_4B_CHROME.twins.forEach(t => Tween.run(t, { opacity: 0 }, dur));
    }

    // === BEAT 4 (regions reveal) annotations ===
    // Variance-explained stat + region-colored customer callouts (replacing beat 3 versions).
    let BEAT4_ANNO_G = null;
    let BEAT4_REGION_CALLOUTS = null;  // array of <g> per callout for staggered reveal

    function ensureBeat4Annotations() {
      if (BEAT4_ANNO_G) return;
      BEAT4_ANNO_G = svg('g', { id: 'beat4-anno', opacity: 1 });
      LAYERS.labels.appendChild(BEAT4_ANNO_G);

      // === VARIANCE stat (replaces beat-3 n=503 in top-right) ===
      const varStatG = svg('g', { 'data-role': 'var-stat', opacity: 0 });
      const statsX = STAGE.C.x + STAGE.C.w - 4;
      const statsY = STAGE.C.y + 8;
      const eyebrowV = svg('text', {
        x: statsX, y: statsY,
        'text-anchor': 'end',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 10, 'letter-spacing': '0.16em', 'font-weight': 600,
        fill: 'var(--brand-text-muted)',
      });
      eyebrowV.textContent = 'VARIANCE EXPLAINED';
      varStatG.appendChild(eyebrowV);
      const varNum = svg('text', {
        x: statsX, y: statsY + 28,
        'text-anchor': 'end',
        'font-size': 28, 'font-weight': 700, fill: 'var(--brand-orange)',
        'letter-spacing': '-0.02em',
      });
      const varRegion = svg('tspan', {
        'font-size': 11, 'font-weight': 600, fill: 'var(--brand-text-muted)',
        'letter-spacing': '0.10em',
        dx: '-4',
      });
      varRegion.textContent = 'REGION → ';
      varNum.appendChild(varRegion);
      const varVal = svg('tspan');
      varVal.textContent = '64%';
      varNum.appendChild(varVal);
      varStatG.appendChild(varNum);
      BEAT4_ANNO_G.appendChild(varStatG);
      BEAT4_ANNO_G._varStatG = varStatG;

      // === Region-colored customer callouts (labels parked in a clean column on the right) ===
      // Same vertical positioning as beat 3 so the labels swap in place when 4A activates.
      const targetX = STAGE.C.x + STAGE.C.w * 0.30;
      const LABEL_X = STAGE.C.x + STAGE.C.w * 0.50;
      const priceToY = (p) => {
        const frac = (p - 40) / (240 - 40);
        return STAGE.C.y + STAGE.C.h - frac * STAGE.C.h;
      };
      const regionCallouts = [
        { label: 'Customer A', price: 172, x: targetX,     y: priceToY(172), labelY: STAGE.C.y + 128,
          region: 'California',   color: 'var(--region-california)' },
        { label: 'Customer C', price: 156, x: targetX - 7, y: priceToY(156), labelY: STAGE.C.y + 198,
          region: 'PNW',          color: 'var(--region-pnw)' },
        { label: 'Customer B', price: 108, x: targetX + 4, y: priceToY(108), labelY: STAGE.C.y + 300,
          region: 'Great Plains', color: 'var(--region-great-plains)' },
      ];

      BEAT4_REGION_CALLOUTS = regionCallouts.map((c) => {
        const g = svg('g', { 'data-role': 'region-callout', opacity: 0 });
        // V7: background plate to lift the callout out of the dot field
        // (esp. important for Customer B which sits in a crowded region).
        g.appendChild(svg('circle', {
          cx: c.x, cy: c.y, r: 14,
          fill: 'var(--brand-bg)', 'fill-opacity': 0.85,

        }));
        // Halo ring in region color
        g.appendChild(svg('circle', {
          cx: c.x, cy: c.y, r: 11,

          'stroke-width': 2.2, 'stroke-opacity': 1,
        }));
        // Inner solid dot in region color (slightly larger for emphasis)
        g.appendChild(svg('circle', {
          cx: c.x, cy: c.y, r: 5.5,
          fill: c.color,
        }));
        // Leader from dot to label
        const lx = LABEL_X;
        const ly = c.labelY;
        g.appendChild(svg('line', {
          x1: c.x + 11, y1: c.y,
          x2: lx - 6, y2: ly + 4,
          stroke: c.color, 'stroke-width': 1.2,
          'stroke-opacity': 0.75,
        }));
        // v9 feedback: gray rounded box behind the three label lines so the
        // text doesn't get lost in the region-colored dot field.
        g.appendChild(svg('rect', {
          x: lx - 8, y: ly - 14,
          width: 116, height: 54,
          rx: 8, ry: 8,
          fill: 'var(--brand-bg-deep)',
          'fill-opacity': 0.92,
          stroke: 'var(--brand-hairline)',
          'stroke-width': 1,
          'stroke-opacity': 0.7,
        }));
        // Customer eyebrow
        const labelEyebrow = svg('text', {
          x: lx, y: ly,
          'text-anchor': 'start',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 9.5, 'letter-spacing': '0.14em', 'font-weight': 600,
          fill: 'var(--brand-text-muted)',
        });
        labelEyebrow.textContent = c.label.toUpperCase();
        g.appendChild(labelEyebrow);
        // Price
        const labelPrice = svg('text', {
          x: lx, y: ly + 18,
          'text-anchor': 'start',
          'font-size': 16, 'font-weight': 700, fill: 'var(--brand-navy-ink)',
          'letter-spacing': '-0.01em',
        });
        labelPrice.textContent = '$' + c.price;
        g.appendChild(labelPrice);
        // Region tag (third line, in region color)
        const labelRegion = svg('text', {
          x: lx, y: ly + 34,
          'text-anchor': 'start',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 10, 'letter-spacing': '0.12em', 'font-weight': 700,
          fill: c.color,
        });
        labelRegion.textContent = c.region.toUpperCase();
        g.appendChild(labelRegion);
        BEAT4_ANNO_G.appendChild(g);
        return g;
      });
    }

    function hideBeat4Annotations(dur) {
      if (!BEAT4_ANNO_G) return;
      const d = dur === undefined ? 300 : dur;
      if (BEAT4_ANNO_G._varStatG) Tween.run(BEAT4_ANNO_G._varStatG, { opacity: 0 }, d);
      if (BEAT4_REGION_CALLOUTS) BEAT4_REGION_CALLOUTS.forEach(g => Tween.run(g, { opacity: 0 }, d));
    }

    CHAPTERS['regions'] = function(beat, prevBeat) {
      ensureCurveC();
      ensureRegionLegend();
      ensureBeat3Annotations();
      ensureBeat4Annotations();

      if (beat.storyId === '4A') {
        // === DISCOVERY MOMENT ===
        // Layout: horizontal legend at top with mean prices; beat-3 guide stays;
        // beat-3 callouts swap for region-colored ones; stats swap for variance%.
        layoutRegionLegend('horizontal-C');
        hideBeat4BChrome(false);
        // Restore slot-C axes
        const axes4A = document.getElementById('axes-c');
        if (axes4A) Tween.run(axes4A, { opacity: 1 }, 200);

        // Hide beat-1 annotations if user jumped here directly from beat 1
        if (BEAT1_CALLOUT_G)    Tween.run(BEAT1_CALLOUT_G, { opacity: 0 }, 200);
        if (BEAT1_PROJECTION_G) Tween.run(BEAT1_PROJECTION_G, { opacity: 0 }, 200);

        // Keep BEAT3 guide visible (dashed line + SAME VOLUME label)
        if (BEAT3_ANNO_G)    Tween.run(BEAT3_ANNO_G, { opacity: 1 }, 200);
        if (BEAT3_GUIDE_G)   Tween.run(BEAT3_GUIDE_G, { opacity: 1 }, 200);
        // Hide BEAT3 stats + callouts (replaced by BEAT4 versions)
        if (BEAT3_STATS_G)   Tween.run(BEAT3_STATS_G, { opacity: 0 }, 200);
        if (BEAT3_CALLOUTS_G) Tween.run(BEAT3_CALLOUTS_G, { opacity: 0 }, 200);

        // Start: dots reset to gray scatter positions (no flash)
        DOTS.forEach((dot, i) => {
          dot.setAttribute('r', '3');
          const target = SCATTER_C_POSITIONS[i];
          // If coming from beat 3 (gray scatter), they're already in place
          Tween.run(dot, { cx: target.x, cy: target.y }, 400);
        });

        // === STAGGERED REGION REVEAL ===
        // Color dots one region at a time. Legend chips fade up in sync.
        // California first (highest price), then PNW, Southwest, Great Plains.
        REGIONS.forEach((region, regionIdx) => {
          // Stagger by region rank (already 0..3 = California..Great Plains)
          const delay = regionIdx * 320;
          scheduleBeat(() => {
            // Guard: only proceed if we're still on 4A
            if (!BEATS[APP.currentBeat] || BEATS[APP.currentBeat].storyId !== '4A') return;
            // Color all dots belonging to this region
            for (let i = 0; i < DOTS.length; i++) {
              if (DOT_REGION[i] === regionIdx) {
                DOTS[i].setAttribute('fill', region.color);
                Tween.run(DOTS[i], { opacity: 0.85, r: 3.5 }, 450);
              }
            }
          }, delay);
        });

        // Reveal legend (whole legend at once — chips don't need per-region stagger
        // since they're already laid out and the dots themselves cascade)
        Tween.run(REGION_LEGEND_EL, { opacity: 1 }, 400);

        // V7: variance stat callout removed per feedback (was interfering with the
        // legend chips at the top of the chart).
        if (BEAT4_ANNO_G._varStatG) {
          Tween.run(BEAT4_ANNO_G._varStatG, { opacity: 0 }, 200);
        }
        // Region callouts staggered to match the region reveal order
        BEAT4_REGION_CALLOUTS.forEach((g, i) => {
          // Match the dot reveal stagger: Customer A=California(0), C=PNW(1), B=Great Plains(3)
          const regionRank = [0, 1, 3][i];
          scheduleBeat(() => {
            if (BEATS[APP.currentBeat] && BEATS[APP.currentBeat].storyId === '4A') {
              Tween.run(g, { opacity: 1 }, 450);
            }
          }, regionRank * 320 + 180);
        });

        // Curve stays hidden
        Tween.run(CURVE_PATH_EL, { opacity: 0 }, 200);
        if (CURVE_LABEL_G) Tween.run(CURVE_LABEL_G, { opacity: 0 }, 200);
      } else if (beat.storyId === '4B') {
        // Explicit two-panel layout: scatter in slot L, jitter twins in slot R.
        buildBeat4BChrome();
        layoutRegionLegend('horizontal-L');
        // Hide slot-C axes
        const axes4B = document.getElementById('axes-c');
        if (axes4B) Tween.run(axes4B, { opacity: 0 }, 200);
        // Hide all beat-3 / beat-4 anno (4B has its own world)
        if (BEAT3_ANNO_G) Tween.run(BEAT3_ANNO_G, { opacity: 0 }, 200);
        hideBeat4Annotations(200);
        // Also hide beat-1 callouts in case user jumped here from beat 1/2
        if (BEAT1_CALLOUT_G)    Tween.run(BEAT1_CALLOUT_G, { opacity: 0 }, 200);
        if (BEAT1_PROJECTION_G) Tween.run(BEAT1_PROJECTION_G, { opacity: 0 }, 200);

        // Move main DOTS to slot L (compressed scatter, colored by region)
        DOTS.forEach((dot, i) => {
          const region = REGIONS[DOT_REGION[i]];
          dot.setAttribute('fill', region.color);
          dot.setAttribute('r', '3');
          const target = SCATTER_L_POSITIONS[i];
          Tween.run(dot, { cx: target.x, cy: target.y, opacity: 0.8 }, 700);
        });

        // Position twins, tween to slot R jitter
        const twins = BEAT_4B_CHROME.twins;
        for (let i = 0; i < DOT_COUNT; i++) {
          const twin = twins[i];
          const srcCx = parseFloat(DOTS[i].getAttribute('cx')) || SCATTER_C_POSITIONS[i].x;
          const srcCy = parseFloat(DOTS[i].getAttribute('cy')) || SCATTER_C_POSITIONS[i].y;
          twin.setAttribute('cx', String(srcCx));
          twin.setAttribute('cy', String(srcCy));
          const target = JITTER_R_POSITIONS[i];
          Tween.run(twin, { cx: target.x, cy: target.y, opacity: 0.8 }, 700);
        }

        Tween.run(BEAT_4B_CHROME.group, { opacity: 1 }, 400);
        Tween.run(REGION_LEGEND_EL, { opacity: 1 }, 300);
        // Curve fully hidden in 4B — the story is "same data, two views",
        // not "data + curve". Curve returns later.
        Tween.run(CURVE_PATH_EL, { opacity: 0 }, 200);
        if (CURVE_LABEL_G) Tween.run(CURVE_LABEL_G, { opacity: 0 }, 200);
      }
    };

    // === CHAPTER 4 — 4×4 grid ===
    // Tile geometry: full stage divided into 4×4, padded inside Slot fitting whole stage.
    const GRID_AREA = { x: 80, y: 70, w: 940, h: 500 };
    const TILE_COUNT = 16;
    const GRID_TILES = (() => {
      const cols = 4, rows = 4;
      const padX = 14, padY = 14;
      const tw = (GRID_AREA.w - padX * (cols - 1)) / cols;
      const th = (GRID_AREA.h - padY * (rows - 1)) / rows;
      const tiles = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          tiles.push({
            idx: r * cols + c,
            x: GRID_AREA.x + c * (tw + padX),
            y: GRID_AREA.y + r * (th + padY),
            w: tw, h: th,
          });
        }
      }
      return tiles;
    })();

    // Driver tiles: which 4 of the 16 are "relevant". We scatter them across the
    // grid (no two in the same row/column) so the eye doesn't read them as a diagonal.
    const RELEVANT_TILES = [2, 4, 11, 13];
    const DRIVER_NAMES = ['Region', 'Channel', 'Order Size', 'Customer Tier'];
    const TILE_IS_RELEVANT = (i) => RELEVANT_TILES.includes(i);

    // Attribute label for each of the 16 mini-plots. The four "real" drivers
    // (Region, Channel, Order Size, Customer Tier) sit at the indices in
    // RELEVANT_TILES so they line up with the scattered driver layout.
    const GRID_ATTRIBUTES = [
      // Row 0
      'SKU',            'Day of week',    'Region',         'Payment terms',
      // Row 1
      'Channel',        'Sales rep',      'Lead source',    'Quarter',
      // Row 2
      'Discount tier',  'Shipping mode',  'Industry',       'Order Size',
      // Row 3
      'Account age',    'Customer Tier',  'Currency',       'Product line',
    ];

    // Assign each dot to one of 16 tiles (round-robin)
    const DOT_TILE = (() => {
      const arr = new Array(DOT_COUNT);
      for (let i = 0; i < DOT_COUNT; i++) arr[i] = i % TILE_COUNT;
      return arr;
    })();

    // Precompute positions per dot inside its tile. For relevant tiles, use a
    // Gaussian vertical smear by region — same pattern as the 4B jitter plot,
    // scaled down to tile size — so the signal reads as the same visual idiom.
    function gaussianBM(rng) {
      let u = 0, v = 0;
      while (u === 0) u = rng();
      while (v === 0) v = rng();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }
    // Per-region vertical std-dev as fraction of tile height (matches 4B's relative
    // spread). Means descend so California sits high, Great Plains low.
    const SMEAR_MEAN_FRACS = [0.22, 0.40, 0.58, 0.76];
    const SMEAR_STD_FRACS  = [0.092, 0.085, 0.090, 0.080];
    function smearPositionInTile(rng, tile, region) {
      const stripW = tile.w / 4;
      // Horizontal: Gaussian clustered around strip center (not uniform)
      const xSpread = gaussianBM(rng) * stripW * 0.18;
      const cx = tile.x + stripW * (region + 0.5) + xSpread;
      // Vertical: Gaussian around region mean, occasional outliers (~8%)
      let vSpread = gaussianBM(rng) * tile.h * SMEAR_STD_FRACS[region];
      if (rng() < 0.08) vSpread *= 2.4;
      const cy = tile.y + SMEAR_MEAN_FRACS[region] * tile.h + vSpread;
      return {
        x: Math.max(tile.x + 3, Math.min(tile.x + tile.w - 3, cx)),
        y: Math.max(tile.y + 4, Math.min(tile.y + tile.h - 4, cy)),
      };
    }

    function buildTilePositions(tilesToUse) {
      const rng = seededRng(2026);
      const arr = new Array(DOT_COUNT);
      for (let i = 0; i < DOT_COUNT; i++) {
        const tileIdx = DOT_TILE[i];
        const tile = tilesToUse[tileIdx];
        if (!tile) { arr[i] = null; continue; }
        const region = DOT_REGION[i];
        if (TILE_IS_RELEVANT(tileIdx)) {
          // Driver tile: vertical smear by region (the 4B idiom, in miniature).
          arr[i] = smearPositionInTile(rng, tile, region);
        } else {
          // Noise tile: random scatter with no trend. Keep the same 4 vertical
          // strips so dots are still colored by region, but y is uniform.
          const stripW = tile.w / 4;
          const cx = tile.x + stripW * (region + 0.5) + (rng() - 0.5) * stripW * 0.5;
          const cy = tile.y + (0.20 + rng() * 0.60) * tile.h;
          arr[i] = { x: cx, y: cy };
        }
      }
      return arr;
    }

    const GRID_DOT_POSITIONS = buildTilePositions(GRID_TILES);

    // 4-tile "drivers row" positions (used in beat 7).
    // Vertically centered: bigger, more confident tiles. Each tile gets a
    // bold driver name + mono-caps descriptive caption underneath.
    const DRIVERS_ROW_TILES = (() => {
      const padX = 30;
      const w = (1000 - padX * 3) / 4;   // ~228 wide
      const h = 360;
      const y = 90;
      return [0, 1, 2, 3].map(i => ({
        idx: RELEVANT_TILES[i],
        x: 50 + i * (w + padX),
        y, w, h,
      }));
    })();
    const DRIVERS_ROW_POSITIONS = (() => {
      // For dots whose tile is one of the 4 relevant, place them in the corresponding driver-row tile,
      // using the same Gaussian smear pattern as the 4B jitter plot.
      const rng = seededRng(303);
      const arr = new Array(DOT_COUNT);
      for (let i = 0; i < DOT_COUNT; i++) {
        const tileIdx = DOT_TILE[i];
        const relevantPos = RELEVANT_TILES.indexOf(tileIdx);
        if (relevantPos < 0) { arr[i] = null; continue; }
        const tile = DRIVERS_ROW_TILES[relevantPos];
        const region = DOT_REGION[i];
        arr[i] = smearPositionInTile(rng, tile, region);
      }
      return arr;
    })();

    // Build tile frames + badges + driver-name labels (created once, opacity-toggled)
    let GRID_FRAMES = null;       // [g] of 16 group elements
    let GRID_BADGES = null;       // [g] of 16 (✓ or —)
    let GRID_LABELS = null;       // [g] of 4 driver-name labels for the relevant tiles
    let GRID_PRICE_HINTS = null;  // [text] of 4 "(Price)" Y-axis hints under each driver name
    let GRID_MINI_LABELS = null;  // [text] of 16 attribute names above each mini-plot
    let GRID_SIG_ANNO = null;     // small "clear pattern" annotation on the Region tile (beat 6)
    let GRID_NOISE_ANNO = null;   // small "noise" annotation on the SKU tile (beat 6)
    let GRID_STATS_G = null;      // mono-caps stats header in top-right of grid area
    let GRID_STATS_TEXT = null;   // the actual text node (so beats 6/7 can swap content)
    let GRID_SIGNAL_WASHES = null; // [rect]×4 — orange wash behind each relevant tile (beat 6)
    let GRID_VARIANCE_TEXTS = null; // [text]×4 — "X% OF VARIANCE" caption below each signal tile (beat 6)
    function ensureGridDom() {
      if (GRID_FRAMES) return;
      GRID_FRAMES = [];
      GRID_BADGES = [];
      GRID_TILES.forEach(t => {
        const frame = svg('g', { 'data-tile': t.idx, opacity: 0 });
        frame.appendChild(svg('rect', {
          x: t.x, y: t.y, width: t.w, height: t.h,
          rx: 4, ry: 4,
          fill: 'none', stroke: 'var(--brand-divider)', 'stroke-width': 1,
        }));
        LAYERS.grid.appendChild(frame);
        GRID_FRAMES.push(frame);

        // Badge — analytical chip style. Signal: orange "SIG" rect chip + "p<.01" caption.
        // Noise: small italic mono "n.s." (no chip). Anchored top-right of tile.
        const badge = svg('g', { 'data-badge': t.idx, opacity: 0,
          transform: `translate(${t.x + t.w - 8}, ${t.y + 8})` });
        const isRel = TILE_IS_RELEVANT(t.idx);
        if (isRel) {
          const chipRect = svg('rect', {
            x: -38, y: 0, width: 38, height: 15,
            rx: 2.5, ry: 2.5,
            fill: 'var(--brand-orange)',
          });
          const chipText = svg('text', {
            x: -19, y: 11,
            'text-anchor': 'middle',
            'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
            'font-size': 9.5, 'letter-spacing': '0.14em',
            'font-weight': 700, fill: '#fff',
          });
          chipText.textContent = 'SIG';
          const pText = svg('text', {
            x: -1, y: 28,
            'text-anchor': 'end',
            'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
            'font-size': 8.5, 'letter-spacing': '0.10em',

          });

        } else {

          nsText.textContent = 'n.s.';
          badge.appendChild(nsText);

        GRID_BADGES.push(badge);
      });

      // Signal-tile orange washes (faint background tint, behind frame + dots).

      GRID_SIGNAL_WASHES = [];
      RELEVANT_TILES.forEach((tileIdx) => {

          fill: 'var(--brand-light-orange)',
          'fill-opacity': 0,
        });
        LAYERS.grid.insertBefore(wash, LAYERS.grid.firstChild);
        GRID_SIGNAL_WASHES.push(wash);
      });

      // Variance % text under each signal tile (beat 6 only).
      // Non-overlapping cumulative explanation: REGION 64, CHANNEL 18, ORDER SIZE 7, TIER 3.
      GRID_VARIANCE_TEXTS = [];
      const VARIANCE_VALUES = [64, 18, 7, 3];
      RELEVANT_TILES.forEach((tileIdx, i) => {
        const t = GRID_TILES[tileIdx];
        const txt = svg('text', {
          x: t.x + t.w / 2, y: t.y + t.h + 16,
          'text-anchor': 'middle',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 10.5, 'letter-spacing': '0.10em',
          'font-weight': 700, fill: 'var(--brand-orange)',
          opacity: 0,
        });
        txt.textContent = VARIANCE_VALUES[i] + '%  OF VARIANCE';
        LAYERS.labels.appendChild(txt);
        GRID_VARIANCE_TEXTS.push(txt);
      });

      // Per-mini-plot attribute labels — numbered, mono caps, navy. Above each tile.
      GRID_MINI_LABELS = [];
      GRID_TILES.forEach((t, i) => {
        const num = String(i + 1).padStart(2, '0');
        const lbl = svg('text', {
          x: t.x + t.w / 2,
          y: t.y - 6,
          'text-anchor': 'middle',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 9.5,
          'letter-spacing': '0.10em',
          'font-weight': 600,
          fill: 'var(--brand-navy-ink)',
          'fill-opacity': 0.78,
          opacity: 0,
          class: 'mini-label',
        });
        lbl.textContent = num + ' · ' + GRID_ATTRIBUTES[i].toUpperCase();
        LAYERS.labels.appendChild(lbl);
        GRID_MINI_LABELS.push(lbl);
      });

      // Stats header — mono caps, top-right of grid area. Updated by beats 5/6/7.
      GRID_STATS_G = svg('g', { id: 'grid-stats', opacity: 0 });
      GRID_STATS_TEXT = svg('text', {
        x: GRID_AREA.x + GRID_AREA.w, y: GRID_AREA.y - 26,
        'text-anchor': 'end',
        'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
        'font-size': 11, 'letter-spacing': '0.14em', 'font-weight': 700,
        fill: 'var(--brand-navy-ink)',
      });
      GRID_STATS_TEXT.textContent = '16 ATTRIBUTES  ·  n = 503';
      GRID_STATS_G.appendChild(GRID_STATS_TEXT);
      LAYERS.labels.appendChild(GRID_STATS_G);

      // Signal/noise inline annotations (beat 6 only).
      // Anchor "clear pattern" on a SIGNAL tile (Region at index 2) and "noise"
      // on a NOISE tile (SKU at index 0). The top-right corner holds the chip
      // badge so we anchor at bottom-left to avoid overlap.
      {
        const tSig = GRID_TILES[2];   // Region — a driver
        GRID_SIG_ANNO = svg('text', {
          x: tSig.x + 6,
          y: tSig.y + tSig.h - 6,
          'font-size': 10,
          'font-style': 'italic',
          fill: 'var(--brand-orange)',
          id: 'beat6-sig-anno',
          opacity: 0,
        });
        GRID_SIG_ANNO.textContent = 'clear pattern';
        LAYERS.labels.appendChild(GRID_SIG_ANNO);

        const tNoise = GRID_TILES[0]; // SKU — pure noise
        GRID_NOISE_ANNO = svg('text', {
          x: tNoise.x + 6,
          y: tNoise.y + tNoise.h - 6,
          'font-size': 10,
          'font-style': 'italic',
          fill: 'var(--brand-text-muted)',
          id: 'beat6-noise-anno',
          opacity: 0,
        });
        GRID_NOISE_ANNO.textContent = 'noise';
        LAYERS.labels.appendChild(GRID_NOISE_ANNO);
      }

      // Driver-row labels (placed below DRIVERS_ROW_TILES) — created once, toggled in beat 7.
      // Each driver shows a bold name and a small mono-caps description underneath.
      const DRIVER_CAPTIONS = ['where they buy', 'how they buy', 'how much they buy', 'what they’re worth'];
      GRID_LABELS = [];
      GRID_PRICE_HINTS = [];
      DRIVERS_ROW_TILES.forEach((t, i) => {
        const lbl = svg('text', {
          x: t.x + t.w / 2, y: t.y + t.h + 30,
          'text-anchor': 'middle', 'font-size': 22, 'font-weight': 600,

          'letter-spacing': '-0.01em',
        });

        LAYERS.labels.appendChild(lbl);
        GRID_LABELS.push(lbl);

        const hint = svg('text', {
          x: t.x + t.w / 2, y: t.y + t.h + 54,
          'text-anchor': 'middle',
          'font-family': 'JetBrains Mono, IBM Plex Mono, ui-monospace, Consolas, monospace',
          'font-size': 10.5, 'letter-spacing': '0.14em',
          'font-weight': 600, fill: 'var(--brand-text-soft)',
          opacity: 0,

        hint.textContent = DRIVER_CAPTIONS[i].toUpperCase();
        LAYERS.labels.appendChild(hint);
        GRID_PRICE_HINTS.push(hint);
